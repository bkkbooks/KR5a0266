  - {type: variant, offset: 9949, length: 2, content: 十六, CK-KZ: 源惟道爲尊道以覺世則玄妙之秘旨性命之要法也茲冊淵源所自肇起天仙之眞傳凡後世一切元機奧穴文總不出此範圍焉蓋世人只知依文解義用識解推測則於經内所論眞仙大道天地日月四時五行水火龍虎丹藥鉛汞抽添河車還丹鍊形朝元内觀魔難證驗以爲如是如是而豈知不僅如是如是夫言外有義義外有神非第關合更多玄妙微乎微乎殆不可以章句詮不可以心思度乎是殆五祖七眞一切賢聖之要典乎由唐迄今千百餘年所共尊奉而循行者乎現届重訂全書宗正小子鳩工庀材實督任剞劂之事而於此經竊欲誌一言爰作數語附於篇末至此經之精微則宏教眞君恩大祖師言之詳且賅矣夫何庸再贅爲哉純陽法嗣正化子恩洪謹跋}
