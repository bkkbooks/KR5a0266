body:
  text: 鍾吕傳道正陽真人鍾離權雲房述純陽真人吕嵓洞賓集華陽真人施肩吾希聖傳論還丹吕曰鍊形成氣鍊氣成神鍊神合道未敢聞命所謂還丹者何也鍾曰所謂丹者非色也紅黃不可以致之所謂丹者非味也甘和不可以合之丹乃丹田也丹田有三上田神舍中田氣府下田精區精中生氣氣在中丹氣中生神神在上丹真水真氣合而成精精在下丹奉道之士莫不有三丹然而氣生於腎未朝於中元神藏於心未超於上院所謂精華不能返合雖三丹終成無用吕曰玄中有玄一切之人莫不有命命中無精非我之氣也乃父母之元陽無精則無氣非我之神也乃父母之元神所謂精氣神乃三田之寶如何可得而常在於上中下三宫也鍾曰腎中生氣氣中有真一之水使水復還於下丹則精養靈根氣自生矣心中生液液中有正陽之氣使氣復還於中丹則氣養靈源神自生矣集靈為神合神入道以還上丹而後超脫吕曰丹田有上中下還者既往而有所歸曰還丹還丹之理奧旨淵微敢告細説鍾曰有小還丹有大還丹有七返還丹有九轉還丹有金液還丹有玉液還丹有以下丹還上丹有以上丹還中丹有以中丹還下丹有以陽還陰丹有以陰還陽丹不止於名號不同亦以時候差别而下手處各異也吕曰小還丹者何也鍾曰小還丹者本自下元下元者五藏之主三田之本以水生木木生火火生土土生金金生水既相生也不差時候當生而引未生如子母之相愛也以火剋金金剋木木剋土土剋水水剋火既相剋也不失分度當剋而補未剋如夫婦之相合也氣液轉行周而復始自子至午陰陽當生自卯至酉陰陽當停凡一晝一夜復還下丹巡還一次而曰小還丹也奉道這士於中採藥進火以成下丹良由此矣吕曰小還丹既已知矣所謂大還者何也鍾曰龍虎相交而變黃芽抽鉛添汞而成大藥玄武宫中而金精才起玉京山下而真氣方升走河車於嶺上灌玉液於中衢自下田入上田自上田復下田後起前來循環已滿而曰大還丹也奉道之士於中起龍虎而飛金精養胎仙而生真氣以成中丹良由此矣吕曰大還丹既已知矣所謂七返還丹而九轉還丹者何也鍾曰五行生成之數五十有五天一地二天三地四天五地六天七地八天九地十一三五七九陽也共二十五二四六八十陰也共三十自腎為始水一火二木三金四土五此則五行生之數也三陽而二陰自腎為始水六火七木八金九土十此則五行成之數也三陰而二陽人身之中共有五行生成之道水為腎而腎得一與六也火為心而心得二與七矣木為肝而肝得三與八矣金為肺而肺得四與九矣土為脾而脾得五與十矣每藏各有陰陽陰以八極而二盛所以氣到肝而腎之餘陰絶矣氣到心太極而生陰以二在心而八在肝也陽以九盡而一盛所以液到肺而心之餘陽絶矣液到腎太極而生陽以一在腎而九在肺也奉道之士始也交媾龍虎而採心之正陽之氣正陽之氣乃心之七也七返中元而入下田養就胎仙復還於心乃曰七返還丹者也二八陰消真氣生而心無陰以絶二也大藥就而肝無陰以絶八也既二八陰消而九三陽可長矣肝以絶陽助於心則三之肝氣盛矣七既還心以絶肺液而肺之九轉而助心則九三之陽長九轉還丹也吕曰七返者以其心之陽復還於心而在中丹九轉者以其肺之陽本自心生轉而復還於心亦在中丹七返九轉既已知矣所謂金液玉液上中下相交陰與陽往復而還丹者何也鍾曰前賢往聖多以肺液入下田而曰金液還丹心液入下田而曰玉液還丹此論非不妙矣然而未盡玄機蓋夫肺生腎以金生水金入水中何得謂之還丹腎剋心以水剋火水入火中何得謂之還丹金液乃肺液也肺液為胎胞含龍虎保送在黃庭之中大藥將成抽之肘後飛起其肺液以入上宫而下還中丹自中丹而還下田故曰金液還丹也玉液乃腎液也腎液隨元氣以上升而朝於心積之而為金水舉之而滿玉池散而為瓊花鍊而為白雪若以納之自中田而入下田有藥則沐浴胎仙若以升之自中田而入四支鍊形則更遷塵骨不升不納周而復還故曰玉液還丹者也陰極陽生陽中有真一之水其水隨陽上升是陰還陽丹者也陽極生陰陰中有正陽之氣其氣隨陰下降是陽還陰丹者也補腦鍊頂以下還上既濟澆灌以上還中燒丹進火以中還下鍊質焚身以下還中五行顚倒三田返復互相交换以至鍊形化氣鍊氣成神自下田遷而至中田自中田遷而至上田自上田遷而出天門棄下凡軀以入聖流仙品方為三遷功成自下而上不復更有還矣論鍊形吕曰還丹既已知矣所謂鍊形之理可得聞乎鍾曰人之生也形與神為表裏神者形之主形者神之舍形中之精以生氣氣以生神液中生氣氣中生液乃形中之子母也水以生木木以生火火以生土土以生金金以生水氣傳子母而液行夫婦乃形中之陰陽也水化為液液化為血血化為津以陰得陽而生也若以陰陽失宜則涕泪涎汗橫出而陰失其生矣氣化為精精化為珠珠化為汞汞化為砂以陽得陰而成也若以陰陽失宜則病老死苦而陽不得成矣陰不得陽不生陽不得陰不成奉道之士修陽而不修陰鍊己而不鍊物以己身受氣之初乃父母真氣兩停而即精血為胎胞寄質在母純陰之宫陰中生陰因形造形胎完氣足而堂堂六尺之驅皆屬陰也所有一點元陽而已必欲長生不死以鍊形住世而劫劫長存必欲超凡入聖以鍊形化氣而身外有身吕曰形象陰也陰則有體以有為無使形化氣而超凡軀以入聖品乃鍊之上法也因形留氣以氣養形小則安樂延年大則留形住世既老者返老還童未老者定顏長壽以三百六十年為一歲三萬六千歲為一劫三萬六千劫為一浩劫浩浩之劫不知歲月之幾何而與天地長久乃鍊形驗證也如此然而鍊形之理造化之機而有如此之驗可得聞乎鍾曰人之成形三百日胎完既生之後五千日氣足五尺五寸為本軀以應五行生成之數或有大小之形而不齊者以寸定尺長短合宜心之上為九天腎之下為九地腎到心八寸四分心到重樓第一環八寸四分重樓第一環到頂八寸四分自腎到頂凡三尺五寸二分而元氣一日一夜盈滿者三百二十度每度二尺五寸二分計八十一丈元氣以應九九純陽之數心腎相去以合天地懸隔之宜自腎到頂共二尺五寸又按五行五五純陽之數故元氣隨呼而出既出也榮衛皆通天地之正氣應時順節或交或離丈尺無窮隨吸而入既入也經絡皆闢一呼一吸天地人三才之真氣往來於十二樓前一往一來是日一息晝夜之間人有一萬三千五百息分而言之一萬三千五百呼所呼者自己之元氣從中而出一萬三千五百吸所吸者天地之正氣自外而入根源牢固元氣不損呼吸之間可以奪天地之正氣以氣鍊氣散滿四大清者榮而濁者衛悉皆流通縱者經而橫者絡盡得舒暢寒暑不能為害勞苦不能為虞體輕骨健氣爽神清永保無疆之壽長為不老之人苟或根源不固精竭氣弱上則元氣已泄下則本宫無補所吸天地之氣浩浩而出八十一丈元氣九九而損不為己之所有反為天地所取何能奪於天地之正氣積而陰盛陽衰氣弱而病氣盡而死復入輪回吕曰元氣如何不走失以鍊形質可奪天地之正氣而留浩劫長存者也鍾曰欲戰勝者在兵強欲民安者在國富所謂兵者元氣也其兵在內消形質之陰其兵在外奪天地之氣所謂國者本身也其身之有象者豐足而常有餘其身之無形者堅固而無不足萬户長開而無一失之虞一馬誤行而有多多之得或前或後乃所以鍊質焚身或上或下乃所以養陽消陰燒乾坤自有時辰煅氣液能無日候以玉液鍊形仗甲龍以升飛而白雪滿於塵肌以金液鍊形逐雷車而下降則金光盈於卧室吕曰鍊形之理亦粗知矣金液玉液者何也鍾曰金液鍊形則骨朝金色而體出金光金花片片而空中自現乃五氣朝元三陽聚頂欲超凡體之時而金丹大就之日若以玉液鍊形則肌泛陽酥而形如琪樹瓊花玉蘂更改凡體而光彩射人乘風而飛騰自如形將為氣者也奉道之士雖知還丹之法而鍊形之功亦不為小矣當玉液還丹以沐浴胎仙而升之上行以河車般於四大始於肝也肝受之則光盈於目而目如點漆次於心也心受之口生靈液而液為白雪次於脾也脾受之則肌若凝脂而瘢痕盡除次於肺也肺受之則鼻聞天香而顏復少年次於腎也腎受之則再還本府耳中常聞絃管之音鬢畔永絶斑白之色若此玉液之鍊形也及夫金液鍊形不得比此始還丹而未還與君火相見而曰既濟既還丹而復起與真陰相敵而曰鍊質土本剋水若金液在土使黃帝回光以合於太陰火本剋金也若金液在火使赤子同爐而自生於紫氣於水中起火在陽裏消陰變金丹於黃庭之內鍊陽神在五氣之中於肝則青氣沖於肺則白色出於心則赤光現於腎則黑氣升於脾則黃色五氣朝於中元從君火以超內院下元陰中之陽其陽無陰升而聚在神宫中元陽中之陽其陽無生升而聚在神宫黃庭大藥陰盡純陽升而聚在神宫五液朝於下元五氣朝於中元三陽朝於上元朝元既畢功滿三千或而鶴舞頂中或而龍飛身內但聞嘹喨樂聲又睹仙花亂墜紫庭盤桓真香馥郁三千功滿不為塵世之人一炷香消已作蓬瀛之客乃曰超凡入聖而脫質升仙者也論朝元吕曰鍊形之理既已知矣所謂朝元者可得聞乎鍾曰大藥將就玉液還丹而沐浴胎仙真氣既生以沖玉液上升而更改塵骨而曰玉液鍊形及夫肘後飛起金精河車以入內院自上而中自中而下金液還丹以鍊金砂而五氣朝元三陽聚頂乃鍊氣成神非止於鍊形住世而已所謂朝元今古少知苟或知之聖賢不説蓋以是真仙大成之法默藏天地不測之機誠為三清隱祕之事忘言忘象之玄旨無問無應之妙理恐子之志不篤而學不專心不寧而問不切輕言易語反我以漏泄聖機之愆彼此各為無益吕曰始也悟真仙而識大道次以知時候而達天機辨水火真原知龍虎不生肝肺察抽添大理審鉛汞非是坎離五行顚倒之術已蒙指教三田反復之機又謝敷陳熟曉還丹鍊形之理深知長生不死之術然而脫凡入聖之原脫質升仙之道本於鍊氣而朝元所謂朝元敢告略為指訣鍾曰道本無形及乎大原示朴上清下濁合而為一大朴既分混沌初判而為天地天地之內東西南北而列五方每方各有一帝每帝各有二子一為陽而一為陰乃曰二氣相生相成而分五行五行相生相成而定六氣乃曰三陰三陽以此推之如人之受胎之初精氣為一及精氣既分而先生二腎一腎在左左為玄玄以升氣而上傳於肝一腎在右右為牝牝以納液而下傳膀胱玄牝本乎無中來以無為有乃父母之真氣納於純陰之地故曰谷神不死是謂玄牝玄牝之門可比天地之根玄牝二腎也自腎而生五藏六府全焉其中肝為木曰甲乙可比於東方青帝心為火曰丙丁可比於南方赤帝肺為金曰庚辛可比於西方白帝脾為土曰戊己可比於中央黃帝腎為水曰壬癸可比於北方黑帝人之初生故無形象止於一陰一陽及其胎完而有腸胃乃分六氣三男三女而已一氣運五行五行運六氣先識者陰與陽陽有陰中陽陰有陽中陰次識者金木水火土而有水中火火中水水中金金中木木中火火中土在人者互相交合所以二氣分而為六氣大道散而為五行如冬至之後一陽生五方之地而陽皆生也一帝當其行令而四帝助之若以春令既行黑帝不收其令則寒不能變溫赤帝不備其令則溫不能變熱及夫夏至之後一陰生五方之天而陰皆降也一帝當其行令而四帝助之若以秋令既行赤帝不收其令則熱不能變涼黑帝不備其令則涼不能變寒冬至陽生於地以朝氣於天也夏至陰生於天以朝氣於地也奉道之士當深究此理而日月之間一陽始生而五藏之氣朝於中元一陰始生而五藏之液朝於下元陰中之陽陽中之陽陰陽之中之陽三陽上朝內院心神以返天宫是皆朝元者也吕曰陽生之時而五氣朝於中元陰生之時而五液朝於下元使陽中之陽陰中之陽陰陽之中之陽以朝上元若此修持常常之士亦有知者如何得超脫以出塵俗鍾曰若以元陽之氣以一陽始生之時上朝中元是人皆如此若以積氣生液以一陰始生之時下朝下元是人皆如此若此行持故不能超脫然而欲超凡入聖脫質升仙當先龍虎交媾而成大藥大藥既成而生真氣真氣既生於年中用月月上定興衰月中用日日上數直事日中用時時上定息數以陽養陽陽中不得留陰以陽鍊陰陰中不得散陽凡以春則肝旺而脾弱夏則心旺而肺弱秋則肺旺而肝弱冬則腎旺而心弱人以腎為根本每時一季脾旺而腎弱獨腎於四時有損人之多疾病者此也凡以甲乙在肝直事防脾氣不行丙丁在心直事防肺氣不行戊己在脾直事防腎氣不行庚辛在肺直事防肝氣不行壬癸在腎直事防心氣不行一氣盛而一氣弱一藏旺而一藏衰人之多疾病者此也凡以心氣萌於亥而生於寅旺於已而弱於申肝氣萌於申而生於亥旺於寅而弱於已肺氣萌於寅而生於已旺於申弱於亥腎氣萌於已而生於申旺於亥而弱於寅脾氣春隨肝而夏則隨心秋隨肺而冬則隨腎人之不知日用莫曉生旺強弱之時所以多疾病者此也若此日月時三陽既聚當鍊陽而使陰不生若此月日時三陰既聚當養陽而使陽不散又況真氣既生以純陽之氣鍊五藏之氣不息而出本色一舉而到天池始以腎之無陰而九江無浪次以肝之無陰而八關永閉次以肺之無陰而金火同爐次以脾之無陰而玉户不開次以真氣上升四氣聚而為一縱有金液下降杯水不能勝輿薪之火水火相包而合之為一以入神宫定息內觀一意不散神識俱妙靜中常聞樂聲如夢非夢若在虛無之境風光景物不比塵俗繁華美麗勝及人世樓臺宫闕碧瓦凝煙珠翠綺羅馨香成陳當此之時乃曰超內院而陽神方得聚會而還上丹鍊神成仙以合大道一撞天門金光影裏以現法身鬧花深處而坐凡體乘空如履平川萬里若同展臂若也復回再入本軀神與形合天地齊其長久若也厭居塵世寄下凡胎而返十洲於紫府太微真君處契勘鄉原對會名姓校量功行之高下得居於三島而遨遊永在於風塵之外名曰超塵脫凡吕曰鍊形止於住世鍊氣方可升仙世人不達玄機無藥而先行胎息強留在腹或積冷氣而成病或發虛陽而作疾修行本望長生似此執迷尚不免於疾病殊不知胎仙就而真氣生真氣生而自然胎息胎息以鍊氣鍊氣以成神然而鍊氣必審年中之月月中之日日中之時端居靜室忘機絶迹當此之時心境未除者悉以除之或而妄想不已智識有漏志在升仙而心神不定為之奈何鍾曰交合各有時行持各有法依時行法即法求道指日成功易如反掌古今達士閉目冥心以入希夷之域良以內觀而神識自在矣論內觀吕曰所謂內觀之理可得聞乎鍾曰內觀坐忘存想之法先賢後聖有取而有不取者慮其心猿意馬無所停留恐因物而喪志而無中立象使耳不聞而目不見心不狂而意不亂存想事物而內觀坐忘不可無矣奈何少學無知之徒不知交合之時又不曉行持之法必望存想而決要成功意內成丹想中取藥鼻搐口咽望有形之日月無為之天地留止腹中可謂兒戲所以達士奇人而於坐忘存想一旦毁之乃曰夢裏得財安能濟用畫地為餅豈可充飢空中又空如鏡花水月終難成事然而有可取者蓋以易動者片心難伏者一意好日良時可採可取也雖知清靜之地奈何心為事役志以情移時比電光寸陰可惜毫末有差而天地懸隔積年纍月而不見功其失在心亂而意狂者也善視者志在丹青之美而不見泰華善聽者志在絲竹之音而不聞雷霆耳目之用小矣尚以如此況一心之縱橫六合而無不該得時用法之際能不以存想內觀而致之乎吕曰所謂存想內觀大略如何鍾曰如陽升也多想為男為龍為火為天為雲為鶴為日為馬為煙為霞為車為駕為花為氣若此之類皆內觀存想如是以應陽升之象也如陰降也多想為女為虎為水為地為雨為龜為月為牛為泉為泥為船為葉若此之類皆內觀存想如是以應陰降之象也青龍白虎朱雀玄武既有此名須有此象五嶽九州四海三島金男玉女河車重樓呼名比類不可具述皆以無中立象以定神識未得魚則筌不可失矣未獲兔則蹄不可無矣後車將動必履前車之迹大器已成必為後器之模則內觀之法行持不可闕矣亦不可執之於悠久絶之於斯須皆不可也若以絶念無想是為真念真念是為真空真空一境乃朝真遷化而出昏衢超脫之漸也開基創始指日進功則存想可用況當為道日損以入希夷之域法自減省全在內觀者矣吕曰若以龍虎交媾而匹配陰陽其想也何似鍾曰初以交合配陰陽而定坎離其想也九皇真人引一朱衣小兒上升九皇真母引一皂衣小女下降相見於黃屋之前有一黃衣老嫗接引如人間夫婦之禮盡時歡悅女子下降兒子上升如人間分離之事既畢黃嫗抱一物形若朱橘下拋入黃屋以金器盛留然此兒者是乾索於坤其陽復還本位以陽負陰而會本鄉是此女者是坤索於乾其陰復還本位以陰抱陽而會本鄉是曰坎離相交而匹配陰陽者也若以炎炎火中見一黑虎而上升滔滔浪裏見一赤龍而下降二獸相逢交戰在樓閣之前朱門大啓浡浡煙焰之中有王者指顧於大火焚天而上有萬丈波濤火起復落煙焰滿於天地龍虎一盤一繞而入一金器之中下入黃屋之間似置在籠匱之中若此龍虎交媾而變黃芽之想也吕曰匹配陰陽而龍虎交媾內觀存想既已知之矣所謂進火燒煉丹藥者所想如何鍾曰其想也一器如鼎如釜或黃或黑形如車輪左青龍而右白虎前朱雀而後玄武傍有二臣衣紫袍躬身執圭而立次有僕吏之類執薪然火於器次有一朱衣王者乘赤馬駕火雲自空而來舉鞭指呼唯恐火小焰發炎炎亘空撞天欲出天關不開煙焰復下周圍四匝人物器釜王者大臣盡在紅焰之中互相指呼爭要進火器中之水無氣而似凝結水中之珠無暗而似光彩若此進火燒丹藥之想也吕曰內觀存想止於採藥進火而有邪逐法逐事而有邪鍾曰雲雷下降煙焰上起或而天雨奇花祥風瑞氣起於殿庭之下或而仙娥玉女乘彩鳳祥鸞自青霄而來金盤中捧玉露霞漿而下獻於王者若此乃金液還丹而既濟之想也若以龍虎曳車於火中上衝三關三關各有兵吏不計幾何器仗戈甲恐懼於人先以龍虎撞之不開次以大火燒之方啓以至崑崙不住及到天池方止或而三鶴沖三天或而雙蝶入三宫或而五彩雲中捧朱衣小兒而過天門或而金車玉輅載王者而超三界若此肘後飛金精而大河車之想也及夫朱衣使者乘車循行自冀州入兖州自兖州入青州自青州入徐州自徐州入揚州自揚州入荆州自荆州入梁州自梁州入雍州自雍州復還冀州東西南北畢於豫州停留而後循行所得之物金玉所幹之事凝滯一吏傳命而九州通和周而復始運行不已或而遊五嶽自恆山為始或而泛五湖自北沼為始或而天符勑五帝或而王命詔五侯若此還丹之想也及夫珠玉散擲於地或而雨露濟澤於物或而海潮而滿百川或而陽生而發萬彙或而火發以遍天地或而煙霧而充宇宙若此鍊形之想也及夫或如鶴之辭巢或如龍之出冗或而五帝朝天或而五色雲起或而跨丹鳳而沖碧落或如夢寐中而上天衢或而天花亂墜仙樂嘈雜而金光繚繞以入宫殿繁華之處若此皆朝元之想也朝元之後不復存想方號內觀吕曰內觀玄理不比前法可得聞乎鍾曰古今修道之士不達天機始也不解依法行持欲以速求超脫多入少出而為胎息冥心閉目以行內觀止於定中以出陰神乃作清靈之鬼非為純陽之仙真仙上聖所以採藥進火抽鉛添汞還丹鍊形朝元合氣苦語詳言而深説惟恐世人不悟而於內觀未甚留意殊不知內觀之法乃陰陽變换之法仙凡改易之時奉道之士勿得輕示而小用之矣且以前項之事交會有時日行持有法則凡所謹節信心依時行法不差毫末而指日見功若此內觀一無時日二無法則所居深靜之室晝夜端拱識認陽神趕逐陰鬼達磨面壁九年方超內院世尊冥心六載始出凡籠故於內觀誠為難事始也自上而下紫河車搬入天宫天宫富貴孰不欽羡或往或來繁華奢侈人所不得見者悉皆有之奉道之士平日清淨而守於瀟灑寂寞既已久矣功到數足輒受快樂樓臺珠翠女樂笙簧珍羞異饌異草奇花景物風光觸目如畫彼人不悟將謂實到天宫不知自身內院認作真境因循而不出入乃曰因在昏衢而留形住世不得脫質以為神仙未到天宫方在內觀陰鬼外魔因意生像因像生境以為魔軍奉道之人因而狂蕩而入於邪中或而失身於外道終不能成仙蓋以三尸七魄唯願人死而自身快樂九蟲六賊苦以人安則存留無處論魔難吕曰內觀以聚陽神鍊神以超內院上踴以出天門直超而入聖品既出既入而來往無差或來或往而遠近不錯欲住世則神與形合欲升仙則遠遊蓬島若此功滿三千而自內觀以得超脫不知陰鬼邪魔如何制使奉道之人不得升神仙者也鍾曰奉道之士始有信心以恩愛利名一切塵勞之事不可變其大志次發苦志以勤勞寂寞一切清虛之境不可改其初心苦志必欲了於大成止於中成而已必欲了於中成止於小成而已又況不識大道難曉天機所習小法而多好異端歲月蹉跎不見其功晚年衰老復入輪回致使後來好道之士以長生為妄説超脫為虛言往往聞道而不信心縱信之而無苦志對境生心以物喪志終不能出於十魔九難之中矣吕曰所謂九難者何也鍾曰大藥未成而難當寒暑於一年之內四季要衣真氣未生而尚有飢渴於一日之間三餐要食奉道之士所患者衣食逼迫一難也及夫宿緣業重流於今世填還忙裏偷間猶為尊長約束於尊親曰不忍逃離一向清間而難為得暇奉道之士所患者尊長邀攔此二難也及夫愛者妻兒惜者父母恩伽情杻每日增添火院愁車無時休歇縱有清淨之心難敵愁煩之境奉道之士所患者恩愛牽纏三難也及夫富兼萬户貴極三公妄心不肯暫休貪者惟憂不足奉道之士所患者名利縈絆四難也及夫少年不肯修持一以氣弱成病頑心絶無省悟一以陰報成災見世一身受苦而與後人為誡奉道之士所患者災禍橫生五難也及夫人以生死事大急於求師之人不擇真偽或師於辨辭利口或師於道貌古顏始也自謂得遇神仙終久方知好利之輩奉道之士所患者盲師約束六難也及夫盲師狂友妄指傍門尋枝摘葉而終無契合小法異端而互相指訣殊不知日月不出出則大明使有目者皆見雷霆不震震則大驚使有耳者皆聞彼以爝火之光井蛙之語熒熒唧唧而豈有合同奉道之士所患者議論差别七難也及夫朝為而夕改坐作而立忘悅於須臾而厭為持久始於憂勤而終於懈怠奉道之士所患者志意懈怠八難也及夫身中失年年中失月月中失日日中失時少將名利不忘於心老而兒孫嘗在於意年光有限勿謂今年已過以待明年人事無涯勿謂今日已過以待明日今日尚不保明日老年爭却得少年奉道之士所患者歲月蹉跎九難也免此九難方可奉道九難之中或有一二不可行持但以徒勞而不能成功者也吕曰九難既已知矣所謂十魔者可得聞乎鍾曰所謂十魔者凡有三等一曰身外見在二曰夢寐三曰內觀如滿目花芳滿耳笙簧舌於甘味鼻好異香情思舒蕩意氣洋洋如見不得認是六賊魔也如瓊樓寶閣畫楝雕梁珠簾繡幕蕙帳蘭房珊瑚遍地金玉滿堂如見不得認是富魔也如金鞍寶馬重蓋昂昂侯封萬户使節旌幢滿門青紫靴笏盈牀如見不得認是貴魔也如輕煙蕩漾暖日舒長暴風大雨雷震電光笙簧嘹喨哭泣悲傷如見不得認是六情魔也如親戚患難眷屬災傷兒女疾病父母喪亡兄弟離散妻妾分張如見不得認是恩愛魔也如失身火鑊墮落高岡惡蟲為害毒藥所傷路逢凶黨犯法身亡如見不得認是患難魔也如十地當陽三清玉皇四神七曜五嶽八王威儀節制往復翶翔如見不得認是聖賢魔也如雲屯士馬兵刃如霜戈矛鬥舉弓箭齊張爭來殺害驍捷難當如見不得認是刀兵魔也如仙娥玉女羅列成行笙簧嘹喨齊舉霓裳雙雙紅袖爭獻金觴如見不得認是女樂魔也如幾多姝麗艷質濃粧蘭臺夜飲玉體輕裳殢人驕態爭要成雙如見不得認是女色魔也是此十魔難有不認者是也既認則著既著則執所以不成道者良以此也若以奉道之人身外見在而不認不執則心不退而志不移夢寐之間不認不著則神不迷而魂不散內觀之時若見如是當審其虛實辨其真偽不可隨波逐浪認賊為子急起三昧真火以焚身一揮群魔自散用紫河車搬運自己之陽神超內院而返天宫然後以求超脫今古好道之流有清淨之心對境改志往往難逃於十魔九難空有好道之虛名終不見得道之實迹或而出離塵勞幽居絶迹而志在玄門於九難不能盡除在十魔或著一二非不得道也而於道中或得中成或得小成而於仙中或為人仙或為地仙若以盡除魔難序證驗而節節升遷以內觀合就陽神指日而歸三島論證驗吕曰嫌者病而好道之人求無病而長安怕者死而好道之人欲不死而長生舉世人在世中而好道之人欲升仙遊物外舉世人在地上而好道之人欲超凡而入洞天所以甘於勞苦而守於貧賤遊心在清淡瀟灑之中潛迹於曠野荒僻之地一向行持不知功之深淺法之交换難測改易之早晚所謂下功之後而證驗次序如何鍾曰苦志行持終不見功者非道負人蓋奉道之人不從明師而所受非法依法行持終不見功者非道負人蓋奉道之人不知時候而以不成若已遇明師而得法行大法以依時何患驗證而不有也吕曰所謂法者有數乎所謂時者有數乎鍾曰法有十二科匹配陰陽第一聚散水火第二交媾龍虎第三燒鍊丹藥第四肘後飛金精第五玉液還丹第六玉液鍊形第七金液還丹第八金液鍊形第九朝元鍊氣第十內觀交换第十一超脫分形第十二其時則年中法天地陰陽升降之宜月中法日月往來之數日中有四正八卦十千十二支一百刻六十分依法區分自一日之後證驗次序以至脫質升仙無差毫末始也淫邪盡罷而外行兼修凡採藥之次而金精充滿心境自除以煞陰鬼次心經上湧口有甘液次陰陽擊摶時時腹中聞風雷之聲次魂魄不定夢寐多有恐悸之境次六府四肢或生微疾小病不療自愈次丹田夜則自暖形容晝則清秀次居暗室而目有神光自現次夢中雄勇物不能害而人不能欺或若抱得嬰兒歸次金關玉鎖封固以絶夢泄遺漏次鳴雷一聲關節通連而驚汗四溢次玉液烹潄以成凝酥次靈液成膏漸畏腥羶以充口腹次塵骨將輕而變神室步趁奔馬行止如飛次對境無心而絶嗜欲次真氣入物可以療人疾病次內觀明朗而不暗昧次雙目童人如點漆皺臉重舒而紺髮再生已少者永駐童顏次真氣漸足而似常飽所食不多而飲酒無量終不見醉次身體光澤神氣秀媚聖丹生味靈液透香真香異味常在口鼻之間人或知而聞之次以目視百步而見秋毫次身體之間舊痕殘靨自然消除涕淚涎汗亦不見有次胎完氣足以絶飲食次內志清高以合太虛凡情凡愛心境自絶下盡九蟲上死三尸次魂魄不遊以絶夢寐神彩清爽更無晝夜次陽精成體神府堅固四體不畏寒暑次生死不能相干而坐忘內觀以遊華胥神仙之國女樂樓臺繁華美麗殆非人世所有也次功滿行足陰功報應密授三清真籙陰陽變化可能預知人事舉止先見災福次觸目塵冗以厭往還潔身靜處胎仙可現身外有身是為神聖次真氣純陽吁呵可乾外汞次胎仙常欲騰飛祥光生於卧室次靜中時聞樂聲次常人對面雖彼富貴之徒亦聞腥穢蓋凡骨俗體也次神彩自可變移容儀成而仙姿可比玉樹異骨透出金色次行止去處常有神祇自來朝現驅用指呼一如己意次靜中外觀紫霞滿目頂外下視金光罩體次身中忽化火龍飛或而玄鶴起便是神靈以脫凡骨而超出俗流乃曰超脫次超脫之後彩雲繚繞瑞氣紛紜天雨奇花玄鶴對飛異香散而玉女下降授天書紫詔既畢而仙冠仙衣之屬具備節制威儀前後左右不可勝紀相迎相引以返蓬萊而於紫府朝見太微真君契勘鄉原名姓校量功行等殊而於三島安居乃曰真人仙子吕曰今日特蒙尊師開説希夷大理天地玄機不止於耳目清明而精神秀媚殘軀有託終不與糞壤同類然而知之者未必能行行之者未必能得念以生死事大而時光迅速雖知妙理未得行持終不成功與不知無異敢告指教以交會之時行持之法如何下手如何用功鍾曰僕有靈寶畢法凡十卷一十二科中有六儀一曰金誥二曰玉書三曰真原四曰比喻五曰真訣六曰道要包羅大道引喻三清指天地陰陽之升降為範模將日月精華之往來為法則實五仙之指趣乃三成之規式當擇日而授於足下修真十書集卷之十六
