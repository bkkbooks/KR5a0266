body:
  text: 鍾吕傳道集正陽真人鐘離權雲房述純陽真人吕嵓洞賔集華陽真人施肩吾希聖傳論真仙吕曰人之生也安而不病壯而不老生而不死何道可致如此鍾曰人之生自父母交會而二氣相合即精血為胎胞於太初之後而有太質陰承陽生氣隨胎化三百日形圓靈光入體與母分離自太素之後已有升降而長黃芽五千日氣足其數自滿八十一丈方當十五乃曰童男是時陰中陽半可比東日之光過此以往走失元陽耗散真氣氣弱則病老死絶矣平生愚昧自損靈光一世凶頑暗除壽數所以來生而身有等殊壽有長短既生復滅既滅復生轉轉不悟而世世墮落則失身於異類透靈於别殼至真之根性不復於人傍道輪回永無解脫或遇真仙至人與消其罪報除皮脫殼再得人身方在癡瘖愚昧之中積行百劫升在福地猶不免飢寒殘患迤邐升遷漸得完全形貌尚居奴婢卑賤之中苟或復作前孽如立板走丸再入傍道輪回吕曰生於中國幸遇太平衣食稍足而歲月未遲愛者安而嫌者病貪者生而怕者死今日得面尊師再拜再告念以生死事大敢望開陳不病不死之理指教於貧儒者乎鍾曰人生欲免輪回不入於異類軀殼嘗使其身無病老死苦頂天立地負陰抱陽而為人也為人勿使為鬼人中修取仙仙中升取天矣吕曰人死為鬼道成為仙仙一等也何以仙中升取天乎鍾曰仙非一也純陰而無陽者鬼也純陽而無陰者仙也陰陽相雜者人也惟人可以為鬼可以為仙少年不修恣情縱意病死而為鬼也知之修鍊超凡入聖而脫質為仙也仙有五等法有三成修持在人而功成隨分者也吕曰法有三成而仙有五等者何也鍾曰法有三成者小成中成大成之不同也仙有五等者鬼仙人仙地仙神仙天仙之不等皆是仙也鬼仙不離於鬼人仙不離於人地仙不離於地神仙不離於神天仙不離於天吕曰所謂鬼仙者何也鍾曰鬼仙者五仙之下一也陰中超脫神像不明鬼關無姓三山無名雖不入輪回又難返蓬瀛終無所歸止於投胎就舍而已吕曰此是鬼仙行何術用何功而致如此鍾曰修持之人始也不悟大道而欲於速成形如槁木心若死灰神識內守一志不散定中以出陰神乃清靈之鬼非純陽之仙以其一志陰靈不散故曰鬼仙雖曰仙其實鬼也古今崇釋之徒用功到此乃曰得道誠可笑也吕曰所謂人仙者何也鍾曰人仙者五仙之下二也修真之士不悟大道道中得一法法中得一術信心若志終世不移五行之氣悮交悮合形質且固八邪之疫不能為害多安少病乃曰人仙吕曰是此人仙何術何功而致如此鍾曰修持之人始也或聞大道業重福薄一切魔難而改初心止於小成法有功終身不能改移四時不能變换如絶五味者豈知有六氣忘七情者豈知有十戒行潄咽者咍吐納之為錯著採補者笑清淨以為愚好即物以奪天地之氣者不肯休糧好存想而採日月之精者不肯導引孤坐閉息安知有自然屈體勞形不識於無為採陰取婦人之氣與縮金龜者不同養陽食女子之乳與鍊丹者不同以類推究不可勝數然而皆是道也不能全於大道止於大道中一法一術功成安樂延年而已故曰人仙更有一等悅於須臾而厭於持久用功不謹錯時亂日反成疾病而不得延年者世亦多矣吕曰所謂地仙者何也鍾曰天仙者天地之半神仙之才不悟大道止於小成之法不可見功唯以長生住世而不死於人間者也吕曰其地仙如何下手鍾曰始也法天地升降之理取日月生成之數身中用年月日中用時刻先要識龍虎次要配坎離辨水源清濁分氣候早晚收真一察二儀列三才分四象别五運定六氣聚七寶序八卦行九州五行顚倒氣傳子母而液行夫婦也三田反復燒成丹藥永鎮下田鍊形住世而得長生不死以作陸地神仙故曰地仙吕曰所謂神仙者何也鍾曰神仙者以地仙厭居塵世用功不已關節相連抽鉛添汞而金精鍊頂玉液還丹鍊形成氣而五氣朝元三陽聚頂功滿忘形胎仙自化陰盡陽純身外有身脫質升仙超凡入聖謝絶塵俗以返三山乃曰神仙吕曰所謂天仙者何也鍾曰天仙厭居塵境用功不已而得超脫乃曰神仙神仙厭居三島而傳道人間道上有功而人間有行功行滿足受天書以返洞天是曰天仙既為天仙若以厭居洞天效職以為仙官下曰水官中曰地官上曰天官於天地有大功於今古有大行官官升遷歷任三十六洞天而返八十一陽天歷任八十一陽天而返三清虛無自然之界吕曰鬼仙固不可求矣天仙亦未敢望矣所謂人仙地仙神仙之法可得聞乎鍾曰人仙不出小成法凡地仙不出中成法凡神仙不出大成法此是三成之數其實一也用法求道道固不難以道求仙仙亦甚易吕曰古今養命之士非不求長生也非不求升仙也然而不得長生為升仙者何也鍾曰法不合道以多聞强識自生小法傍門不免於疾病死亡猶稱尸解迷惑世人互相推舉致使不聞大道雖有信心苦志之人行持已久終不見功節序而入於泉下嗚呼論大道吕曰所謂大道者何也鍾曰大道無形無名無問無應其大無外其小無內莫可得而知也莫可得而行也吕曰古今達士始也學道次以有道次以得道次以道成而於塵世入蓬島升於洞天升於陽天而升三清是皆道成之士今日尊師獨言道不可得而知不可得而行然於道也獨得隱乎鍾曰僕於道也固無隱爾蓋舉世奉道之士止有好道之名使聞大道而無信心雖有信心而無苦志朝為而夕改坐作而立忘始乎憂勤終則懈怠僕以是言大道難知難行也吕曰大道難知難行之理如何鍾曰以傍門小法易為見功而俗流多得互相傳授至死不悟遂成風俗而敗壞大道有齊戒者有休糧者有採氣者有潄咽者有離妻者有斷味者有禪定者有不語者有存想者有採陰者有服氣者有持淨者有息心者有絶纍者有開頂者有縮龜者有絶迹者有看讀者有燒鍊者有定息者有導引者有吐納者有採補者有布施者有供養者有救濟者有入山者有識性者有不動者有授持者傍門小法不可備陳至如採日月之華奪天地之氣心思意想望結丹砂屈體勞形欲求超脫多入少出攻病可也認為真胎息絶念忘言養性可也指作太一含真氣金槍不倒黃河逆流養命之下法形如槁木心若死灰集神之小術奈何古今奉道之士苦苦留心往往掛意以咽津為藥如何得造化聚氣為丹如何得停留指肝為龍而肺為虎如何得交合認坎為鉛而離為汞如何得抽添四時澆灌望長黃芽一意不散欲求大藥差年錯月廢日亂時不識五行根蒂安知三才造化尋枝摘葉迷惑後人致使大道日遠日疏異端並起而成風俗以失先師之本意者良由道聽塗說口耳之學而指訣於無知之徒遞相訓式節序而入於泉下令人寒心非不欲開陳大道蓋世人業重福薄不信天機重財輕命願為下鬼吕曰小法傍門既已知矣其於大道可得聞乎鍾曰道本無問問本無應及乎真原一判大朴已散道生一一生二二生三一為體二為用三為造化體用不出於陰陽造化皆因於交媾上中下列為三才天地人共得於一道道生二氣二氣生三才三才生五行五行生萬物萬物之中最靈最貴者人也惟人也窮萬物之理盡一己之性窮理盡性以至於命全命保生以合於道當與天地齊其堅固而同得長久吕曰天長地久亘千古以無窮人壽百歲至七十而尚稀何道之獨在於天地而遠於人乎鐘曰道不遠於人而人自遠於道矣所以遠於道者養命不知法所以不知法者下功不識時所以不識時者不達天地之機也論天地吕曰所謂天地之機可得聞乎鍾曰天地之機乃天地運用大道而上下往來行持不倦以得長久堅固未嘗輕泄於人也吕曰天地之於道也如何謂之運用之機如何謂之行持之機運用如何起首行持如何見功鍾曰大道既判而有形因形而有數天得乾道以一為體輕清而在上所用者陽也地得坤道以二為體重濁而在下所用者陰也陽升陰降互相交合乾坤作用不失於道而起首有時見功有日吕曰天得乾道所用者陽也陽主升何以交於地地得坤道所用者陰也陰主降何以交於天天地不交陰陽如何得合陰陽不合乾坤如何作用乾坤既無作用雖有起首之時見功之日大道如何可得也鍾曰天道以乾為體陽為用積氣在上地道以坤為體陰為用積水在下天以行道以乾索於坤一索之而為長男長男曰震再索之而為中男中男曰坎三索之而為少男少男曰艮是此天交於地以地道索坤道而生三陽及乎地以行道以坤索於乾一索之而為長女長女曰巽再索之而為中女中女曰離三索之而為少女少女曰兌是此地交於天以坤道索乾道而生三陰三陽交合於三陰而萬物生三陰交合於三陽而萬物成天地交合本以乾坤相索而運行於道乾坤相索而生六氣六氣交合而分五行五行交合而生成萬物方其乾道下行三索既終其陽復升陽中藏陰上還於天坤道上行三索既終其陰復降陰中藏陽下還於地陽中藏陰其陰不消乃曰真陰真陰到天因陽而生所以陰自天降陰中能無陽乎陰中藏陽其陽不滅乃曰真陽真陽到地因陰而發所以陽自地升陽中能無陰乎陽中藏陰其陰不消復到于地陰中藏陽其陽不滅復到于天周而復始運行不已交合不失於道所以長久堅固者如此吕曰天地之機運行於道而得長久乃天地作用之功也惟人也雖有聰明之性留心於清靜欲以奉行大道小則安樂延年中則長生不死大則脫質升仙如何作用運行大道法動天機而亦得長久堅固浩劫常存鍾曰大道無形因彼之所得而為形大道無名因彼之所有而為名天地得之而曰乾道坤道日月得之而曰陰道陽道人若得之朝廷則曰君臣之道閨門則曰夫婦之道鄉黨則曰長幼之道庠序則曰朋友之道室家則曰父子之道是此見於外者莫不有道也至如父母交會其父則陽先進而陰後行以真氣投真水心火與腎水相交鍊為精華精華既出逢母之陰先進以水滌蕩於無用之處逢母之陽先進以血承受於子宫之前精血為胞胎胞舍真氣而入母子宫積日纍月真氣造化成人如天地行道乾坤相索而生三陰三陽真氣為陽真水為陰陽藏水中陰藏氣中氣主於升氣中有真水水主於降水中有真氣真水乃真陰也真氣乃真陽也真陽隨水下行如乾索於坤上曰震中曰坎下曰艮以人比之以中為度自上而下震為肝坎為腎艮為膀胱真陰隨氣上行如坤索於乾下曰巽中曰離上曰兌以人比之以中為度自下而上巽為膽離為心兌為肺形像既備數足離母既生之後元陽在腎因元陽而生真氣真氣朝心因真氣而生真液真液還元上下往復若無虧損自可延年如知時候無差抽添有度自可長生若以造作無倦修持不已陰盡陽純自可超凡入聖此乃天機深造之理古今不傳之事公若信心而無猶豫以名利若枷杻恩愛如寇讎避疾病若怕死亡之難防失身於别殼慮透靈於異類委有清靜之志當且壯其根源無使走失元陽耗散真氣氣盛而魂中無陰陽壯而魄中有氣一升一降取法無出天地一盛一衰其來亦似日月論日月吕曰天地之理亦粗知矣其日月之躔度交合於人可得比乎願聞其說鍾曰大道無形生育天地大道無名運行日月日月者太陰太陽之精默紀天地交合之度助行生成萬物之功東西出沒以分晝夜南北往來以定寒暑晝夜不息寒暑相催而魄中生魂魂中生魄進退有時不失乾坤之數往來有度無差天地之期吕曰東西出沒以分晝夜何也鍾曰混沌初分玄黃定位天地之狀其形如卵六合於中其圓如毬日月出沒運行於一天之上一地之下上下東西周行如輪凡日之東出而西未沒為晝西沒而東未出為夜是此日之出沒以分晝夜也若月之出沒不同於日載魄於西受魂於東光照於夜而魂藏於晝積日纍時或出或沒自西而東其始也魄中生魂狀若彎弓初夜而光照於西其次也魄中魂半時應上弦初夜而光照於南其次魄中魂滿與日相望初夜而光照於東其次也魂中生魄狀如缺鏡初晝而魂藏於西其次也魂中魄半時應下弦初晝而魂藏於南其次也魂中魄滿與日相背初晝而魂藏於東是此月之出沒以分晝夜也吕曰南北往來以定寒暑者何也鍾曰冬至之後日出辰初五十分日沒申末五十分過此以往出沒自南而北以夏至為期夏至之後日出寅末五十分日沒戌初五十分過此以往出沒自北而南以冬至為期自南而北以冬至夏乃寒為暑也自北而南以夏至冬乃暑為寒也夏之日乃冬之夜也冬之日乃夏之夜也冬至之後月出自北而南比於夏之日也夏至之後月出自南而北比於冬之日也是此日月之往來以定寒暑者也吕曰天地之機陰陽升降正與人之行持無二等若此日月之出沒往來交合躔度於人可得比乎鍾曰天地之機在於陰陽之升降一升一降太極相生相生相成周而復始不失於道而得長久修持之士若以取法於天地自可長生而不死若比日月之躔度往來交合止於月受曰魂以陽變陰陰盡陽純月華瑩淨消除暗魄如日之光輝照耀於下土當此時如人之修鍊以氣成神脫質升仙鍊就純陽之體也吕曰修真奉道之士其於天地陰陽升降之理日月精華交合之度下手用功而於二者何先鍾曰始也法效天機明陰陽升降之理使真水真火合而為一鍊成大藥永鎮丹田浩劫不死而壽齊天地如厭居塵世用功不已當取日月之交會以陽鍊陰使陰不生以氣養神使神不散五氣朝元三花聚頂謝絶俗流以歸三島吕曰若此之功驗深達㫖趣所患不知時節矣鍾曰天地之陰陽升降一年一交合日月之精華往來一月一交合人之氣液一晝一夜一交合矣論四時吕曰天地日月之交合年月日時可得聞乎鍾曰凡時有四等人壽百歲一歲至三十乃少壯之時三十至六十乃長大之時六十至九十乃老耄之時九十至百歲或百二十歲乃衰敗之時也是此則曰身中之時一等也若以十二辰為一日五日為一候三候為一氣三氣為一節二節為一時時有春夏秋冬時當春也陰中陽半其氣變寒為溫乃春之時也時當夏也陽中有陽其氣變溫為熱乃夏之時也時當秋也陽中陰半其氣變熱為凉乃秋之時也時當冬也陰中有陰其氣變凉為寒乃冬之時也是此則曰年中之時二等也若以律中起吕吕中起律凡一月三十日三百六十辰三千刻一十八萬分月旦至上弦陰中陽半自上弦至月望陽中陽自月望至下弦陽中陰半自下弦至晦朔陰中陰是此日月中之時三等也若以六十分為一刻八刻二十分為一時一時半為一卦言其卦定八方論其正分四位自子至卯陰中陽半以太陰中起少陽自卯至午陽中有陽純少陽而起太陽自午至酉陽中陰半以太陽中起少陰自酉至子陰中有陰純少陰而起太陰是此則曰日中之時四等也迅難得而易失者身中之時也去速而來遲者年中之月也急若電光速如石火者日中之辰也積日為月積月為歲歲月蹉跎年光迅速貪名求利而妄心未除愛子憐孫而恩情又起縱得回心向道爭奈年老氣衰如春雪秋花止有時間之景夕陽曉月應無久遠之光奉道之士難得者身中之時矣艷陽媚景百卉芬芳水榭危樓清風快意月夜間談雪天對飲恣縱無窮之樂消磨有限之時縱得回心向道須是疾病纏身如破舟未濟誰無求救之心漏屋重完忍絶再修之意奉道之士虛過少年中之時也鄰雞未唱而出户嫌遲街鼓遍聞而歸家恨早貪癡爭肯暫休妄想惟憂不足滿堂金玉病來著甚抵當一眼兒孫氣斷誰能替换曉夜不停世人莫悟奉道之士可惜者日中時也吕曰身中之時年中之時月中之時日中之時皆是時也尊師獨於身中之時為難得又於日中之時為可惜者何也鍾曰奉道者難得少年少年修持根元完固凡事易為見功止於千日而可大成也奉道者又難得中年中年修持先補之完備次下手進功始也返老還童後即入聖超凡也奉道者少年不悟中年不省或因灾難而留心清靜或因疾病而志在希夷晚年修持先論救護次說補益然後自小成法積功以至中成中成法積功止於返老還童鍊形住世而五氣不能朝元三陽難為聚頂脫質升仙無緣而得成是難得者身中之時也吕曰身中之時固知難得矣而日中之時可惜者何也鍾曰人之一日如日月之一月如天地之一年大道生育天地天地分位上下相去八萬四千里冬至之後地中陽升凡一氣十五日上進七千里計一百八十日陽升到天太極生陰夏至之後天中陰降凡一氣十五日下進七千里計一百八十日陰降到地太極復生陽周而復始運行不已而不失於道所以長久運行日月日月成形周圍各得八百四十里月旦之後六中起九凡一日計十二時魄中魂進七十里凡十五日計一百八十時魄中魂進八百四十里月望之後九中起六凡一日計十二時魂中魄進七十里凡十五日計一百八十時魂中魄進八百四十里周而復始運行不已而不失於道所以堅固大道長養萬物萬物之中最靈最貴者人也人之心腎上下相遠八寸四分陰陽升降與天地無二等氣中生液液中生氣氣液相生與日月可同途天地以乾坤相索而陰陽升降一年一交合不失於道一年之後有一年日月以魂魄相生而精華往來一月一交合交合不失於道一月之後有一月人之交合雖在一晝一夜不知交合之時又無採取之法損時又不解補益時又不解收陰交時不解養陽陽交時不解鍊陰月中不知損益日中又無行持過了一年無一年過了一日無一日當風卧濕冒暑涉寒不肯修持而甘心受病虛過時光而端坐候死吕曰奉道之人非不知年光虛度歲月蹉跎而疾病纏身死限將至蓋以修鍊不知法行持不知時是致陰陽交合有差時月行持無准鍾曰身中用年年中用月月中用日日中用時蓋以五藏之氣月上有盛衰日上有進退時上有交合運行五度而氣傳六候金木水火土分列無差東西南北中生成有數鍊精生真氣鍊氣合陽神鍊神合大道論五行吕曰所謂五藏之氣而曰金木水火土所謂五行之位而曰東西南北中若此如何得相生相成而交合有時乎採取有時乎願聞其說鍾曰大道既判而生天地天地既分而列五帝東曰青帝而行春令於陰中起陽使萬物生南曰赤帝而行夏令於陽中升陽使萬物長西曰白帝而行秋令於陽中起陰使萬物成北曰黑帝而行冬令於陰中進陰使萬物死四時各九十日每時下十八日黃帝主之若於春時助成青帝而發生若於夏時接序赤帝而長育若於秋時資益白帝而結立若於冬時制攝黑帝而嚴凛五帝分治各主七十二日合而三百六十日而為一歲輔弼天地以行於道青帝生子而曰甲乙甲乙東方木赤帝生子而曰丙丁丙丁南方火黃帝生子而曰戊己戊己中央土白帝生子而曰庚辛庚辛西方金黑帝生子而曰壬癸壬癸北方水見於時而為象者木為青龍火為朱雀土為勾陳金為白虎水為玄武見於時而生物者乙與庚合春則有榆青而白不失金木之色辛與丙合秋則有棗白而赤不失金火之色己與庚合夏末秋初有瓜青而黃不失土木之色丁與壬合夏則有椹赤而黑不失水火之色癸與戊合冬則有橘黑而黃不失水土之色以類推求五帝相交而見於時者生在物者不可勝數吕曰五行在時若此五行在人如何鍾曰惟人也頭圓足方有天地之象陰降陽升又有天地之機而腎為水心為火肝為木肺為金脾為土若以五行相生則水生木木生火火生土土生金金生水生者為母受生者為子若以五行相剋則水剋火火剋金金剋木木剋土土剋水剋者為夫受剋者為妻以子母言之腎氣生肝氣肝氣生心氣心氣生脾氣脾氣生肺氣肺氣生腎氣以夫妻言之腎氣剋心氣心氣剋肺氣肺氣剋肝氣肝氣剋脾氣脾氣剋腎氣腎者心之夫肝之母脾之妻肺之子肝者脾之夫心之母肺之妻腎之子心者肺之夫脾之母腎之妻肝之子肺者肝之夫腎之母心之妻脾之子脾者腎之夫肺之母肝之妻心之子心之見於內者為脉見於外者為色以寄舌為門户受腎之制伏而驅用於肺蓋以夫婦之理如此得肝則盛見脾則减蓋以子母之理如此腎之見於內者為骨見於外者為髮以兩耳為門户受脾之制伏而驅用於心蓋以夫婦之理如此得肺則盛見肝則减蓋以子母之理如此肝之見於內者為筋見於外者為爪以眼目為門户受肺之制伏而驅用於脾蓋以夫婦之理如此見腎則盛見心則减蓋以子母之理如此肺之見於內者為膚見於外者為毛以鼻冗為門户受心之制伏而驅用於肝蓋以夫婦之理如此得脾則盛見腎則减蓋以子母之理如此脾之見於內者為藏均養心腎肝肺見於外者為肉以唇口為門户呼吸定往來受肝之制伏而驅用於腎蓋以夫婦之理如此得心則盛見肺則减蓋以子母之理如此此是人之五行相生相剋而為夫婦子母傳氣衰旺見於此矣吕曰心火也如何得火下行腎水也如何得水上升脾土也土在中而承火則盛莫不下剋於水乎肺金也金在上而下接火則損安得有生於水乎相生者遞相間隔相剋者親近難移是此五行自相損剋為之奈何鍾曰五行歸原一氣接引元陽升舉而生真水真水造化而生真氣真氣造化而生陽神始以五行定位而有一夫一婦腎水也水中有金金本生水下手時要識水中金水本嫌土採藥後須得土歸水龍乃肝之象虎本肺之神陽龍出於離宫陰虎生於坎位五行逆行氣傳子母自子至午乃曰陽時生陽五行顚倒液行夫婦自午至子乃曰陰中鍊陽陽不得陰不成到底無陰而不死陰不得陽不生到底陰絶而壽長吕曰五行本於陰陽一氣所謂一氣者何也鍾曰一氣者昔父與母交即以精血造化成形腎生脾脾生肝肝生肺肺生心心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱是此陰以精血造化成形其陽止在起首始生之處一點元陽而在二腎且腎水也水中有火升之為氣因氣上升以朝於心心陽也以陽合陽太極生陰乃積氣生液液自心降因液下降以還於腎肝本心之母腎之子傳導其腎氣以至於心矣肺本心之妻腎之母傳導其心液以至於腎矣氣液升降如天地之陰陽肝肺傳導若日月之往復五行名之數也論其交合生成乃元陽一氣為本氣中生液液中生氣腎為氣之根心為液之源靈根堅固恍恍惚惚氣中自生真水心源清潔杳杳冥冥液中自有真火火中識取真龍水中認取真虎龍虎相交而變為黃芽合就黃芽而結成大藥乃曰金丹金丹既就乃曰神仙吕曰金丹就而脫質升仙以返十洲固可知矣如何謂之黃芽鍾曰真龍真虎者是也吕曰龍虎者何也鍾曰龍非肝也乃陽龍陽龍出在離宫真水之中虎非肺也乃陰虎陰虎出在坎位真火之中修真十書鍾吕傅道集卷之十四
