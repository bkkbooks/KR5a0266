body:
  text: 鍾吕傳道集正陽真人鍾離權雲房述純陽真人吕嵓洞賔集華陽真人施肩吾希聖傳論水火吕曰人之長生者鍊就金丹欲鍊金丹先採黃芽欲得黃芽須得龍虎所謂真龍出於離宫真虎生於坎位離坎之中而有水火水火者何也鍾曰凡身中以水言者四海五湖九江三島華池瑶池鳳池天池玉池崑池元潭閬苑神水金波瓊液玉泉陽酥白雪若此名號不可備陳凡身中以火言者君火臣火民火而已三火以元陽為本而生真氣真氣聚而得安真氣弱而成病若以耗散真氣而走失元陽元陽盡純陰成元神離體乃曰死矣吕曰人身之中以一點元陽而興舉三火三火起於群水衆陰之中易為耗散而難炎熾若此陽弱陰盛火少水多令人速於衰敗而不得長生為之奈何也鍾曰心為血海腎為氣海腦為髓海脾胃乃水穀之海是此四海者如此五藏各有液所主之位東西南北中是此五湖者如此小腸二丈四尺而上下九曲乃曰九江小腸之下元潭之說如此頂曰上島心曰中島腎曰下島三島之內根源閬苑之說如此華池在黃庭之下瑶池出丹闕之前崑池上接玉京天池正衝內院鳳池乃心肺之間玉池在唇齒之內神水生於氣中金波降於天上赤龍住處自有瓊液玉泉凡胎换後方見白雪陽酥澆灌有時以沃炎盛先曰玉液次曰金液皆可以還丹抽添有度以應沐浴先曰中田次曰下田皆可以鍊形玉蘂金花變就黃白之體醍醐甘露鍊成奇異之香若此水之功效及夫民火上升助腎氣以生真水腎火上升交心液而生真氣小則降魔除病大則鍊質燒丹用周天則火起焚身勒陽關則還元鍊藥别九州之勢以養陽神燒三尸之纍以除陰鬼上行則一撞三關下運則消磨七魄鍊形成氣而輕舉如飛鍊氣成神而脫胎如蛻若此皆火之功效也吕曰始也聞命所患者火少水多而易衰敗次聽高論水火有如此之功驗畢竟如何造化使少者可以勝多弱者可以致强鍾曰二八陰銷九三陽長赫赤金丹指日可成七返九還而胎仙自化者也真氣在心心是液之源元陽在腎腎是氣之海膀胱為民火不止於民火不能為用而膀胱又為津液之府若以不達天機罔測玄理奉道之士難為造化不免於疾病死亡者矣吕曰所謂造化使陽長陰消金丹可成而胎仙自化者何也鍾曰人之心腎相去八寸四分乃天地定位之比也氣液太極相生乃陰陽交合之比也一日十二時乃一年十二月之比也心生液非自生也因肺液降於心液行液行夫婦自上而下以還下田乃曰婦還夫宫腎生氣非自生也因膀胱氣升而腎氣行氣行子母自下而上以朝中元乃曰夫返婦室肝氣導引腎氣自下而上以至於心心火也二氣相交薰蒸於肺肺液下降自心而來皆曰心生液以液生於心而不耗散故曰真水也肺液傳送心液自上而下以至於腎腎水也二水相交浸潤於膀胱膀胱氣上升自腎而起皆曰腎生氣以氣生於腎而不消磨故曰真火也真火出於水中恍恍惚惚其中有物視之不可見取之不可得也真水出於火中杳杳冥冥其中有精見之不能留留之不能住也吕曰腎水也水中生氣名曰真火火中何者為物心火也火中生液名曰真水水中何者為精火中之物水中之精既無形狀可求縱求之而又難得縱得之而又何用鍾曰前古上聖道成不離於此二物交媾而變黃芽數足胎完以成大藥乃真龍真虎者也論龍虎吕曰龍本肝之象虎乃肺之神是此心火之中而生液液為真水水之中杳杳冥冥而隱真龍龍不在肝而出自離宫者何也是此腎水之中而生氣氣為真火火之中恍恍惚惚而藏真虎虎不在肺而生於坎位者何也鍾曰龍陽物也升飛在天吟而雲起得澤而濟萬物在象為青龍在方為甲乙在物為木在時為春在道為仁在卦為震在人身中五藏之內為肝虎陰物也奔走於地嘯而風生得山而威制百蟲在象為白虎在方為庚辛在物為金在時為秋在道為義在卦為兌在人身中五藏之內為肺且肝陽也而在陰位之中所以腎氣傳肝氣氣行子母以水生木腎氣足而肝氣生肝氣既生以絶腎之餘陰而純陽之氣上升者也且肺陰也而在陽位之中所以心液傳肺液液行夫婦以火剋金心液到而肺液生肺液既生以絶心之餘陽而純陰之液下降者也以其肝屬陽以絶腎之餘陰是以知氣過肝時即為純陽純陽氣中包藏真一之水恍惚無形名曰陽龍以其肺屬陰以絶心之餘陽是知液到肺時即為純陰純陰液中負載正陽之氣杳冥不見名曰陰虎也氣升液降本不能相交奈何氣中真一之水見液相合液中正陽之氣見氣自聚若也傳行之時以法制之使腎氣不走失氣中收取真一之水心液不耗散液中採取正陽之氣子母相逢互相顧戀日得黍米之大百日無差藥力全二百日聖胞堅三百日胎仙完形若彈丸色同朱橘名曰丹藥永鎮下田留形住世浩劫長生以作陸地神仙吕曰腎水生氣氣中有真一之水名曰陰虎虎見液相合也心火生液液中有正陽之氣名曰陽龍龍見氣相合也方以類聚物以羣分理當然也氣生時液亦降氣中真一之水莫不隨液而下傳於五藏乎液生時氣亦升液中正陽之氣莫不隨氣而出於重樓乎真水隨液下行虎不能交龍真陽隨氣上升龍不能交虎龍虎不交安得黃芽黃芽既無安得大藥鍾曰腎氣既生如太陽之出海霧露不能蔽其光液下如疏簾安足以勝其氣氣壯則真一之水自盛矣心液既生如嚴天之殺物呼呵不能敵其寒氣升如翠幕安足以勝其液液盛則正陽之氣或强或弱未可必也吕曰氣生液生各有時時生氣也氣盛則真一之水亦盛時生液也液盛則正陽之氣亦盛盛衰未保何也鍾曰腎氣易為耗散難得者真虎心液難為積聚易失者真龍丹經萬卷議論不出陰陽陰陽兩事精粹無非龍虎奉道之士萬中識者一二或以多聞廣記雖知龍虎之理不識交合之時不知採取之法所以今古達士皓首修持止於小成纍代延年不聞超脫蓋以不能交媾於龍虎採黃芽而成丹藥論丹藥吕曰龍虎之理既已知矣所謂金丹大藥可得聞乎鍾曰所謂藥者可以療病凡病有三等當風卧濕冒暑涉寒勞逸過度飢飽失時非次不安則曰患矣患為時病及夫不肯修持恣情縱意散失元陽耗損真氣年高憔悴則曰老矣老為年病及夫氣盡體空魂消神散長吁一聲四大無主體卧荒郊則曰死矣死為身病且以時之有病以春夏秋冬運行於寒暑溫凉陽大過而陰不足當以凉治之也陰大過而陽不足當以溫治之也老者多冷而幼者多熱肥者足涎而羸者多積男子病生於氣婦人患本於血補其虛而取其實保其弱而損其餘小則針灸甚則藥餌雖有非次不安而時之有患委於明士良醫對病服食悉得保愈然而老病如何醫死病如何治洗腸補肉古之善醫者也面皺髮白以返童顏無人得會换頂續攴古之善醫者也留形住世以得長生無人得會吕曰非次不安因時成病良醫名藥固可治矣虛敗年老之病氣盡命終之苦如何治之莫有藥乎鍾曰凡病有三等時病以草木之藥療之自愈身病年病所治之藥而有二等一曰內丹次曰外丹吕曰外丹者何也鍾曰昔高上元君傳道於人間指諭天地升降之理日月往復之宜自爾丹經滿世世人得聞大道廣成子以教黃帝黃帝政治之暇依法行持久而不見功廣成子以心腎之間而有真氣真水氣水之間而有真陰真陽配合為大藥可比於金石之中而隱至寶乃於崆峒山中以內事為法而鍊大丹八石之中惟用硃砂砂中取汞五金之中惟用黑鉛鉛中取銀汞比陽龍銀為陰虎以心火如砂之紅腎水如鉛之黑年火隨時不失乾坤之策月火抽添自分文武之宜卓三層之爐各高九寸外方內圓取八方之氣應四時之候金鼎之象包藏鉛汞無異於肺液硫黃為藥合和靈砂可比於黃婆三年小成服之可絶百病六年中成服之自可延年九年大成服之而升舉自如壯士展臂可千里萬里雖不能返於蓬萊亦於人世浩劫不死吕曰歷古已來鍊丹者多矣而見功者少何也鍾曰鍊丹不成者有三也不辨藥材真僞不知火候抽添將至寶之物一旦消散於煙焰之中而為灰塵廢時亂日終無所成者一也藥材雖美不知火候火候雖知而乏藥材兩不契合終無所成者二也藥材可美火候合宜年中不差月月中不錯日加减有數進退有時氣足丹成而外行不備化玄鶴而凌空無緣而得餌此不成者三也又況藥材本天地秀氣結實之物火候乃神仙修持得道之術三皇之時黃帝鍊丹九轉方成五帝之後混元鍊丹三年才就逮夫戰國凶氣凝空流尸滿野物不能受天地之秀氣而世乏藥材當得法之人而逃難老死巖谷丹方仙法或有竹帛可紀者久而朽瓌人世不復有矣若以塵世有藥材秦始皇不求於海島若以塵世有丹方魏伯陽不參於周易或而多聞强識迷惑後人萬萬破家並無一成以外求之亦為誤矣吕曰外丹之理出自廣成子以內事為法則縱有成就九年方畢又況藥材難求丹方難得到底止能升騰不見超凡入聖而返十洲者矣敢告內藥者可得聞乎鍾曰外藥非不可用也奉道之人晚年覺悟根源不甚堅固腎者氣之根根不深則葉不茂矣心者液之源源不清則流不長矣必也假其五金八石積日纍月鍊成三品每品三等乃曰九品龍虎大丹助接其真氣鍊形住世輕舉如飛若以修持內事識交合之時知採取之法胎仙既就指日而得超脫彼人不悟執在外丹進火加日服之欲得上升天界誠可笑也彼既不究外藥之源當以詳陳內丹之理內丹之藥材出於心腎是人皆有也內丹之藥材本在天地天地常日得見也火候取日月往復之數修合效夫婦交接之宜聖胎就而真氣生氣中有氣如龍養珠大藥成而陽神出身外有身似蟬脫蛻是此藥內本於龍虎交而變黃芽黃芽就而分鉛汞論鉛汞吕曰內藥不出龍虎也虎出於坎宫氣中之水是也龍出於離宫水中之氣是也外藥取砂中之汞比於陽龍用鉛中之銀比於陰虎而鉛汞外藥也何以龍虎交而變黃芽黃芽就而分鉛汞所謂內藥之中鉛汞者何也鍾曰抱天一之質而為五金之首者黑鉛也鉛以生銀鉛乃銀之母感太陽之氣而為衆石之首者硃砂也砂以生汞汞乃砂之子難取者鉛中之銀易失者砂中之汞銀汞若相合煅鍊自成至寶此鉛汞之理見於外者如此若以內事言之見於人者今古議論差别有殊取其玄妙之說本自父母交通之際精血相合包藏真氣寄質於母之純陰之宫藏神在陰陽未判之內三百日胎完五千日氣足以五行言之人身本是精與血先有水也以五藏言之精血為形像先生腎也腎水之中伏藏於受胎之初父母之真氣真氣隱於人之內腎所謂鉛者此也腎中正氣氣中真一之水名曰真虎所謂鉛中銀者此也腎氣傳肝氣肝氣傳心氣心氣太極而生液液中有正陽之氣所謂硃砂者心液也所謂汞者心液之中正陽之氣是也以氣中真一之水顧戀和合於液中正陽之氣積氣液為胎胞傳送在黃庭之內進火無差胎仙自化乃比鉛銀合汞煅鍊成寶者也吕曰在五金之中鉛中取銀於八石之內砂中出汞置之鼎器配之藥餌汞自為砂而銀自為寶然而在人之鉛如何取銀在人之砂如何取汞汞如何作砂銀如何作寶也鍾曰鉛本父母之真氣合而為一純粹而不離既成形之後而藏在腎中二腎相對同升於氣乃曰元陽之氣氣中有水乃曰真一之水水隨氣升氣住水住氣散水散其水與氣如子母之不相離善視者止見於氣不見於水若以此真一之水合於心之正陽之氣乃曰龍虎交媾而變黃芽以黃芽而為大藥大藥之材本以真一之水為胎內包正陽之氣如昔日父母之真氣即精血為胞胎造化三百日胎完氣足而形備神來與母分離形外既合合則形生形矣奉道之人腎氣交心氣氣中藏真一之水負載正陽之氣以氣交氣水為胞胎狀同黍米溫養無虧始也即陰留陽次以用陽鍊陰氣變為精精變為汞汞變為珠珠變為砂砂變為金丹金丹既就真氣自生鍊氣成神而得超脫化火龍而出昏衢驂玄鶴而入蓬島吕曰以形交形形合生形以氣合氣氣合生氣數不出三百日分形之後男女形狀之不同自己丹砂色澤之何似也鍾曰父母之形交父精先進而母血後行血包於精而為女女者內陽而外陰以象母蓋以血在外也若以母血先進而父精後行精包於血而為男男者內陰而外陽以象父蓋以精在外也所謂血者本生於心而無正陽之氣所謂精者本生於腎而有正陽之氣正陽之氣乃汞之本也即真一之水和合而入黃庭之中汞用鉛湯煮鉛以汞火煎鉛不得汞不能發舉真一之水汞不得鉛不能變化純陽之氣吕曰鉛在腎中而生元陽之氣氣中有真一之水視之不可見也鉛以得汞汞在正陽之氣以正陽之氣燒鍊於鉛鉛生氣盛而發舉於真一之水可以上升然而汞本正陽之氣即真一之水而為胎胞保送黃庭之中已是龍虎交媾陰陽兩停亦以鉛湯煮之莫不陰太過耗散真陽安得成大藥而氣中生氣也鍾曰腎氣投心氣氣極生液液中有正陽之氣配合真一之水名曰龍虎交媾日得之黍米之大名曰金丹大藥保送黃庭之中且黃庭者脾胃之下膀胱之上心之北而腎之南肝之西而肺之東上清下濁外應四色量容二升路通八水所得之藥晝夜在其中若以採藥不進火藥必耗散而不能住若以進火不採藥陰中陽不能住止於發舉腎氣而壯暖下元而已若以採藥有時而進火有數必先於鉛中作借氣進火使大藥堅固永鎮下田名曰採補之法而鍊汞補丹田延年而益壽可為地仙若以採藥而以元鉛抽之於肘後飛金精既抽鉛須添汞不添汞徒以還精補腦而真氣如何得生真氣不生陽神如何得就也既添汞須抽鉛不抽鉛徒以鍊汞補丹田如何變砂砂既不變而金丹如何得就論抽添吕曰採藥必賴氣中之水進火須借鉛中之氣到底抽鉛成大藥若以添汞上可以補丹田所謂抽添之理何也鍾曰昔者上聖傳道於人間以太古之民淳而復朴冥然無知不可得聞大道天地指諭陰陽升降之宜交换於溫凉寒暑之氣而節候有期一年數足周而復始不失於道天地所以長久不慮人之不知而暗於大理蔽在一隅比說於日月精華往來之理進退在旦望弦朔之時而出沒無差一月數足運行不已不失於道日月所以長久奈何寒來暑往暑往寒來世人不悟天地升降之宜月圓復缺月缺復圓世人不悟日月往來之理恣縱無窮之欲消磨有限之時富貴奢華算來只中裝點浮生之夢恩愛愁煩到底做下來生之債歌聲未絶而苦惱早來名利正濃而紅顏已去貪財貪貨將謂萬劫長存愛子憐孫顯望永生同聚貪癡不息妄想長生而耗散元陽走失真氣直待惡病纏身方是歇心之日大限臨頭才為了首之時真仙上聖憫其如此輪回已而歸墮落深欲世人明悟大道比於天地日月之長久始也備說天地陰陽升降之理次以比喻日月精華往來之理彼以不達天機罔測玄妙以內藥比外藥以無情說有情無情者金石金石者外藥也有情者氣液氣液者內藥也大之天地明之日月外之金石內之氣液既採須添既添須抽抽添之理乃造化之本也且冬至之後陽升於地地抽其陰太陰抽而為厥陰少陽添而為陽明厥陰抽而為少陰陽明添而為太陽不然無寒而變溫溫而變熱者也夏至之後陰降於天天抽其陽太陽抽而為陽明少陰添而為厥陰陽明抽而為少陽厥陰添而為太陰不然無熱而為凉凉而變寒也是以天地陰陽升降而變六氣其抽添之驗也若以月受日魂日變月魄前十五日月抽其魄而日添其魂精華已滿光照下土不然無初生而變上弦上弦而變月望者也若以月還陰魄日收陽精後十五日日抽其魂而月添其魄光照已謝陰魄已足不然無月望而變下弦下弦而變晦朔者也是此日月往復而變九六其抽添之驗也世人不達天機罔測玄理真仙上聖以人心所愛者無病長生將金石鍊大丹以人心所好者黃金白銀將鉛汞成至寶本意欲世人悟其大理無情之金石火候無差抽添有數尚可延年益壽若以己身有情之正陽之氣真一之水知交合之時明採取之法積日纍月氣中有氣鍊氣成神以得超脫莫不為今古難得之事人間天上少得解悟當以志心行持而棄絶外事效天地日月長久誘勸迷徒留心於道故有外藥之說今古聖賢或而陳說得聞於世世人又且不悟欺己罔人以失先師之本意將砂取汞以汞點鉛即鉛乾汞用汞變銅不顧身命狂求財物互相推舉以好道為名其實好利而志在黃白之術先聖上仙不得已而隨緣設化對物教人而有鉛汞之說比喻於內事且鉛汞自出金石金石無情之物尚有造化而成寶若以有情自己所出之物如鉛汞之作用莫不亦有造化既有造化莫不勝彼黃白之物也奉道之士當以深究之而勿執在外丹與丹竈之術且夫人之鉛也乃天地之始因太始而有太質為萬物之母因太質而有太素其體也為水中之金其用也為火中之水五行之祖而大道之本也既以採藥為添汞添汞須抽鉛所以抽鉛非在外也自下田入上田名曰肘後飛金晶又曰起河車而走龍虎又曰還精補腦而長生不死鉛既後抽汞自中降以中田還下田始以龍虎交媾而變黃芽是五行顚倒此以抽鉛添汞而養胎仙是三田返覆五行不顚倒龍虎不交媾三田不返覆胎仙不氣足抽鉛添汞一百日藥力全二百日聖胎堅三百日胎仙完而真氣生真氣既生鍊氣成神功滿忘形而胎仙自化乃曰神仙吕曰出於金石者外鉛外汞抽添可以為寶出於己身腎中所藏父母之真氣而為鉛真一正陽所合之藥變而為汞抽添可以生神所謂真鉛真汞亦有抽添乎鍾曰始也得汞須用鉛用鉛終是錯故以抽之而入上宫元氣不傳還精入腦日得之汞陰盡陽純精變為砂而砂變為金乃曰真鉛真鉛者自身之真氣合而得之也真鉛生真氣之中氣中真一之水五氣朝元而三陽聚頂昔者金精下入丹田升之鍊形而體骨金色此者真鉛升之內府而體出白光自下而上自上而下還丹鍊形皆金精往復之功也自前而後自後而前焚身合氣皆真氣造化之功也若以不抽不添止於日用採藥進火安有如此之功驗吕曰凡抽之添之如何得上下有度前後無差鍾曰可升之時不可降可抽之時不可添上下往來無差毫釐河車之力也論河車吕曰所謂河車者何也鍾曰昔有志智人觀浮雲蔽日可以取陰而作蓋觀落葉浮波可以載物而作舟觀飄蓬隨風往來運轉而不已退而作車且車之為物蓋軫有天地之象輪轂如日月之比高道之士取喻於車且車行於地而轉於陸今以河車者亦有說矣蓋人身之中陽少陰多言水之處甚衆車則取意於般運河乃主象於多陰故此河車不行於地而行於水自上而下或後或前駕在於八瓊之內驅馳於四海之中升天則上入崑崙既濟則下奔鳳闕運載元陽直入於離宫般負真氣曲歸於壽府往來九州而無暫停巡歷三田何時休息龍虎既交令黃婆駕入黃庭鉛汞才分委金男般入金闕玉泉千派運時止半日工夫金液一壺般過只時間功迹五行非此車般運也難得生成二氣非此車般運也豈能交會應節順時而下功必假此車而般之方能有驗養陽鍊陰而立事必假此車而般之始得無差乾坤未純其或陰陽而往來之是此車之功也宇宙未周其或氣血而交通之是此車之功也自外而內運天地純粹之氣而接引本宫之元陽自凡而聖運陰陽真正之氣而補鍊本體之元神其功不可以備紀吕曰河車如此妙用敢問河車之理必竟人身之中何物而為之既得之而如何運用鍾曰河車者起北比方正水之中腎藏真氣真氣之所生之正氣乃曰河車河車作用今古罕聞真仙祕而不說者也如乾再索坤而生坎坎本水也水乃陰之精陽既索於陰陽返負陰而還位所過者艮震巽以陽索陰因陰取陰般運入離承陽而生是此河車般陰入於陽宫及夫坤再索於乾而生離離本火也火乃陽之精陰既索於陽陰返抱陽而還位所過者坤兌乾以陰索陽因陽取陽般運入坎承陰而生是此河車運陽於陰宫及夫採藥於九宫之上得之而下入黃庭抽鉛於曲江之下般之而上升內院玉液金液本還丹般運可以鍊形而使水上行君火民火本鍊形般運可以燒丹而使火下進五氣朝元般運各有時三花聚頂般運各有日神聚多魔般真火以焚身則三尸絶迹藥就海枯運霞漿而沐浴而入水無波若此河車之作用也吕曰河車本北方之正氣運轉無窮而負載陰陽各有成就所用工不一也尊師當為細說鍾曰五行巡還周而復始默契顚倒之術以龍虎相交而變黃芽者小河車也肘後飛金精還精入泥丸抽鉛添汞而成大藥者大河車也若以龍虎交而變黃芽鉛汞交而成大藥真氣生而五氣朝中元陽神就而三神超內院紫金丹成常如玄鶴對飛白玉汞就鎮似火龍踴起金光萬道罩俗骨以光輝琪樹一株現鮮葩而燦爛或出或入出入自如或去或來往來無礙般神入體且混時流化聖離俗以為羽客乃曰紫河車也是此三車之名而分上中下三成故曰三成者言其功之驗證非比夫釋教之三乘車而曰羊車鹿車大牛車也以道言之河車之後更有三車凡聚火而心行意使以攻疾病而曰使者車凡既濟自上而下陰陽正合水火共處靜中聞雷霆之聲而曰雷車若以心為境役性以情牽感物而散於真陽之氣自內而外不知休息久而氣弱體虛以成衰老或而八邪五疫返以般入真氣元陽難為抵當既老且病而死者曰破車吕曰五行顚倒而龍虎相交則小河車已行矣三田返復而肘後飛金精則大河車將行矣然而紫河車何日得行焉鍾曰修真之士既聞大道得遇明師曉達天地升降之理日月往來之數始也匹配陰陽次則聚散水火然後採藥進火添汞抽鉛則小河車固當行矣及夫肘後金精入頂黃庭大藥漸成一撞三關直超內院後起前收上補下鍊則大河車固當行矣及夫金液玉液還丹而後鍊形鍊形而後鍊氣鍊氣而後鍊神鍊神合道方曰道成以出凡類入仙品當時乃曰紫河車也修真十書卷之十五
