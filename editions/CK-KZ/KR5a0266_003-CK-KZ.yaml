body:
  text: 論還丹第十三呂曰鍊形成氣鍊氣成神鍊神合道未敢聞命所謂還丹者何也鍾曰所謂還丹者非色也紅黃不可以象之所謂丹者非味也甘和不可以合之丹乃丹田也丹田有三上田神舍中田氣府下田精區精中生氣氣在中丹氣中生神神在上丹眞水眞氣合而成精精在下丹奉道之士莫不有三丹然而氣生於腎未朝於中元神藏於心未超於上院所謂精華不能返合雖三丹終成無用呂曰玄中有玄一切之人莫不有命命中無精非我之氣也乃父母之元陽無精則無氣非我之神也乃父母之元神所謂精氣神乃三田之寶如何可得而常在於上中下三宮也鍾曰腎中生氣氣中有眞一之水使水復還於下丹則精養靈根氣自生矣心中生液液中有正陽之氣使氣復還於中丹則氣養靈源神自生矣集靈爲神合神入道以還上丹而後超脫呂曰丹田有上中下還者旣往而有所歸曰還丹還丹之理其旨淵微敢望細說鍾曰有小還丹有大還丹有七返還丹有九轉還丹有金液還丹有玉液還丹有以下丹還上丹有以上丹還中丹有以中丹還下丹有以陽還陰丹有以陰還陽丹不止於名號不同亦以時候差別而下手處各異也呂曰所謂小還丹者何也鍾曰小還丹者本自下元下元者五藏之主三田之本以水生木木生火火生土土生金金生水旣相生也不差時候當生而引未生如子母之相愛也以火剋金金剋木木剋土土剋水水剋火旣相剋也不失分度當剋而補未剋如夫婦之相合也氣液轉行周而復始自子至午陰陽當生自卯至酉陰陽當停凡一晝一夜復還下丹循還一次而曰小還丹也奉道之士於中採藥進火以成下丹良由此也呂曰小還丹旣己知矣所謂大還丹者何也鍾曰龍虎相交而變黃芽抽鉛添汞而成大藥玄武宮中而金精纔起玉京山下而眞氣方升走河車於嶺上灌玉液於中衢自下田入上田自上田復下田後起前來循環已滿而曰大還丹也奉道之士於中起龍虎而飛金精養胎仙而生眞氣以成中丹良由此矣呂曰大還丹旣已知矣所謂七返還丹而九轉還丹者何也鍾曰五行生成之數五十有五天一地二天三地四天五地六天七地八天九地十一三五七九陽也共二十五二四六八十陰也共三十自腎爲始水一火二木三金四土五此則五行生之數也三陽而二陰自腎爲始水六火七木八金九土十此則五行成之數也三陰而二陽人身之中共有五行生成之道水爲腎而腎得一與六矣火爲心而心得二與七矣木爲肝而肝得三與八矣金爲肺而肺得四與九矣土爲脾而脾得五與十矣每藏各有陰陽陰以八極而二盛所以氣到肝而腎之餘陰絶矣氣到心太極而生陰以二在心而八在肝也陽以九盡而一盛所以液到肺而心之餘陽絶矣液到腎太極而生陽以一在腎而九在肺也奉道之士始也交媾龍虎而採心中正陽之氣乃心之七也七返中元而入下田養就胎仙復還於心乃曰七返還丹者也二八陰消眞氣生而心無陰以絶二也大藥就而肝無陰以絶八也旣二八陰消九三之陽可長矣肝以絶陰助於心則三之肝氣盛矣七旣還心以絶肺液而助心則九之肺氣盛矣此所謂九轉還丹也呂曰七返者以心之陽復還於心而在中丹九轉者以肺之陽本是心生轉而復還於心亦在中丹七返九轉旣已知矣所謂金液玉液上中下相交陰與陽往復而還丹者何也鍾曰前賢往聖多以肺液入下田而曰金液還丹心液入下田而曰玉液還丹此論非不妙矣然而未盡玄機蓋夫肺生腎以金生水金入水中何得謂之還丹腎剋心以水剋火水入火中何得謂之還丹金液乃肺液也肺液爲胎胞含龍虎保送在黃庭之中大藥將成抽之肘後飛起其肺液以入上宮而下還中丹自中丹而還下田故曰金液還丹也玉液乃腎液也腎液隨元氣以上升而朝於心積之而爲金水舉之而滿玉池散而爲瓊花鍊而爲白雪若以納之自中田而入下田有藥則沐浴胎仙若以升之自中田而入四肢鍊形則更遷塵骨不升不納周而復還故曰玉液還丹也陰極生陽陽中有眞一之水其水隨陽上升是陰還陽丹也陽極生陰陰中有正陽之氣其氣隨陰下降是陽還陰丹也補腦鍊頂以下還上旣濟澆灌以上還中燒丹進火以中還下鍊質焚身以下還中五行顚倒三田返復互相交換以至鍊形化氣鍊氣成神自下田遷至中田自中田遷至上田自上田遷出天門棄下凡軀以入聖流仙品方爲三遷功成自下而上不復更有還矣論鍊形第十四呂曰還丹旣已知矣所謂鍊形之理可得聞乎鍾曰人之生也形與神爲表裏神者形之主形者神之舍形中之精以生氣氣以生神液中生氣氣中生液乃形中之子母也水以生木木以生火火以生土土以生金金以生水氣傳子母而液行夫婦乃形中之陰陽也水化爲液液化爲血血化爲津以陰得陽而生也若陰陽失宜則涕淚涎汗橫出而陰失其生矣氣化爲精精化爲珠珠化爲汞汞化爲砂以陽得陰而成也若陰陽失宜則病老死苦而陽不得成矣陰不得陽不生陽不得陰不成奉道之士豈可修陽而不修陰鍊已汞也而不鍊物鉛也夫已身受氣之初乃父母眞氣兩停而卽精血爲胎胞寄質在母純陰之宮陰中生陰因形造形胎完氣足是堂堂六尺之軀皆屬陰所有者一點元陽而已誠欲長生不死以鍊形住世而劫劫長存必在超凡入聖以鍊形化氣而身外有身呂曰形象陰也陰則有體以有爲無使形化氣而超凡軀以入聖品乃鍊形之上法也因形留氣以氣養形小則安樂延年大則留形住世旣老者返老還童未老者定顏長夀以三百六十年爲一嵗三萬六千嵗爲一劫三萬六千劫爲一浩劫浩浩之劫不知嵗月之幾何而與天地長久乃鍊形驗證也至其所以鍊形之理造化之機而有如此之驗可得聞乎鍾曰人之成形三百日胎完旣生之後五千日氣足五尺五寸爲本軀以應五行生成之數或有大小之形而不齊者以寸定尺長短合宜心之上爲九天腎之下爲九地腎到心八寸四分心到重樓第一環八寸四分重樓第一環到頂八寸四分自腎到頂凡二尺五寸二分而元氣一日一夜盈滿者三百六十度每度二尺五寸二分計八十一丈元氣以應九九純陽之數心腎相去以合天地懸隔之宜自腎到頂共二尺五寸又按五行五五純陽之數故元氣隨呼而出旣出也榮衞皆通天地之正氣應時順節或交或離丈尺無窮隨吸而入旣入也經絡皆闢一呼一吸天地人三才之眞氣往來於十二樓前一往一來是曰一息晝夜之間人有一萬三千五百息分而言之一萬三千五百呼所呼者自已之元氣從中而出一萬三千五百吸所吸者天地之正氣自外而入根源牢固元氣不損呼吸之間可以奪天地之正氣以氣鍊氣散滿四大淸者榮而濁者衞悉皆流通縱者經而橫者絡盡得舒暢寒暑不能爲害勞苦不能爲虞體輕骨健氣爽神淸永保無疆之夀長爲不老之人苟或根源不固精竭氣弱上則元氣已泄下則本宮無補所吸天地之氣浩浩而出八十一丈元氣久久而損不爲已之所有反爲天地所取何能奪於天地之正氣積而陰盛陽衰氣弱而病氣盡而死復入輪迴呂曰元氣如何不走失以鍊形質可奪天地之正氣而能浩劫長存也鍾曰欲戰勝者在兵强欲民安者在國富所謂兵者元氣也其兵在内消形質之陰其兵在外奪天地之氣所謂國者本身也其身之有象者豐足而常有餘其身之無形者堅固而無不足萬戶長開而無一失之虞一馬運行而有多得之妙或前或後乃所以鍊質焚身或上或下乃所以養陽消陰燒乾坤自有時辰煅氣液能無日候以玉液鍊形伏甲龍而升飛則白雪滿於塵肌以金液鍊形逐雷車而下降則金光盈於臥室呂曰鍊形之理亦粗知矣金液玉液者何也鍾曰金液鍊形則骨朝金色體出金光金花片片空中自現乃五氣朝元三陽聚頂欲超凡體之時而金丹大就之日若玉液鍊形則肌泛陽酥而形如琪樹瓊花玉蘂更改凡體而光彩射人乘風而飛騰自如形將爲氣者也奉道之士雖知還丹之法而鍊形之功亦不爲小矣當玉液還丹沐浴胎仙而升之上行以河車般於四大始於肝也肝受之則光盈於目而目如點漆次於心也心受之口生靈液而液爲白雪次於脾也脾受之則肌若凝脂而瘢痕盡除次於肺也肺受之則鼻聞天香而顏復少年次於腎也腎受之則丹還本府耳中常聞絃絃管之音鬢畔永絶班白之色此玉液之鍊形也及夫金液鍊形不得比此始還丹而未還與君火相見而曰旣濟旣還丹而復起與眞陰相敵而曰鍊質土本剋水若金液在土使黃帝囘光以合於太陰火本剋金若金液在火使赤子同爐而自生紫氣於水中起火在陽裏消陰變金丹於黃庭之内鍊陽神在五氣之中於肝則靑氣沖於肺則白色出於心則赤光現於腎則黑氣升於脾則黃色起五氣朝於中元從君火以超内院下元陰中之陽其陽無陰升而聚在神宮中元陽中之陽其陽無生升而聚在神宮黃庭大藥陰盡陽純升而聚在神宮五液朝於下元五氣朝於中元三陽朝於上元朝元旣畢功滿三千或而鶴舞頂中或而龍飛身内但聞嘹喨樂聲又覩仙花亂墜紫庭盤桓眞香馥郁三千功滿不爲塵世之人一炷香消已作蓬瀛之客乃曰超凡入聖而脫質升仙者也論朝元第十五呂曰鍊形之理旣已知矣所謂朝元者可得聞乎鍾曰大藥將就玉液還丹沐浴胎仙眞氣旣生以沖玉液上升而更改塵骨而曰玉液鍊形及夫肘後飛起金精河車以入内院自上而中自中而下金液還丹以鍊金砂而五氣朝元三陽聚頂乃鍊氣成神非止於鍊形住世而已所謂朝元今古少知苟或知之聖賢不說蓋以眞仙大成之法默藏天地不測之機誠爲三淸隱秘之事忘言忘象之玄旨無問無應之妙理恐子之志不篤而學不專心不寍而問不切輕言易語反遺我以漏泄聖機之愆彼此各爲無益呂曰始也悟眞仙而識大道次以知時候而達天機辨水火眞原知龍虎不生肝肺察抽添大理審鉛汞非是坎離五行顚倒之術已䝉指教三田反復之機又謝敷陳熟曉還丹鍊形之理深知長生不死之術然而脫凡入聖之原脫質升仙之道本於鍊氣朝元所謂朝元敢望略爲指訣鍾曰夫道本無形及乎大原示樸上淸下濁合而爲一大樸旣分渾沌初判而爲天地天地之内東西南北而列五方各有一帝每帝各有二子一爲陽而一爲陰乃曰二氣二氣相生相成而分五行五行相生相成而定六氣乃曰三陰三陽以此推之如人受胎之初精氣爲一及精氣旣分而先生二腎一腎在左左爲玄玄以生氣而上傳於肝一腎在右右爲牝牝以納液而下傳膀胱玄牝本乎無中來以無爲有乃父母之眞氣納於純陰之地故曰谷神不死是謂玄牝玄牝之門可比天地之根玄牝二腎也自腎而生五藏六府全焉其中肝爲木曰甲乙比東方靑帝心爲火曰丙丁比南方赤帝肺爲金曰庚辛比西方白帝脾爲土曰戊巳比中央黃帝腎爲水曰壬癸比北方黑帝人之初生故無形象止於一陰一陽及其胎完而有腸胃乃分六氣三男三女而已一氣運五行五行運六氣先識者陰與陽陽有陰中陽陰有陽中陰次識者金木水火土而有水中火火中水水中金金中水木中火火中土在人者互相交合所以二氣分而爲六氣大道散而爲五行如冬至之後一陽生五方之地而陽皆生也一帝當其行令而四帝助之若以春令旣行黑帝不收其令則寒不能變温赤帝不備其令則温不能變𤍠及夫夏至之後一陰生五方之天而陰皆降也一帝當其行令而四帝助之若以秋令旣行赤帝不收其令則熱不能變凉黑帝不備其令則凉不能變寒冬至陽生於地以朝氣於天也夏至陰生於天以朝氣於地也奉道之士當深究此理而日用之間一陽始生而五藏之氣朝於中元一陰始生而五藏之液朝於下元陰中之陽陽中之陽陰陽之中之陽三陽上朝内院心神以返天宮是皆朝元者也呂曰陽生之時五氣朝於中元陰生之時而五液朝於下元使陽中之陽陰中之陽陰陽之中之陽以朝上元若此修持常常之士亦有知者如何得超脫以出塵俗鍾曰若元陽之氣以一陽始生之時上朝中元是人皆如此若以積氣生液以一陰始生之時下朝下元是人皆如此若此行持故不能超脫然而欲超凡入聖脫質升仙當先龍虎交媾而成大藥大藥旣成而生眞氣眞氣旣生於年中用月月上定興衰月中用日日上數直事日中用時時上定息數以陽養陽陽中不得留陰以陽鍊陰陰中不得散陽凡以春則肝旺而脾弱夏則心旺而肺弱秋則肺旺而肝弱冬則腎旺而心弱人以腎爲根本每時一季脾旺而腎弱獨腎於四時有損人之多疾病者此也凡以甲乙在肝直事防脾氣不行丙丁在心直事防肺氣不行戊巳在脾直事防腎氣不行庚辛在肺直事防肝氣不行壬癸在腎直事防心氣不行一氣盛而一氣弱一藏旺而一藏衰人之多疾病者此也凡人心氣萌於亥而生於寅旺於巳而弱於申肝氣萌於申而生於亥旺於寅而弱於已肺氣萌於寅而生於巳旺於申而弱於亥腎氣萌於巳而生於申旺於亥而弱於寅脾氣春隨肝而夏則隨心秋隨肺而冬則隨腎人之不知日用莫曉生旺强弱之時所以多疾病者此也若此日月時三陽旣聚當鍊陽而使陰不生三陰旣聚當養陽而使陽不散又況眞氣旣生以純陽之氣鍊五藏之氣無息而非本色一舉而到天池始以腎之無陰而九江無浪次以肝之無陰而八關永閉次以肺之無陰而金火同爐次以脾之無陰而玉戶不開次以眞氣上升四氣聚而爲一縱有金液下降杯水不能勝輿薪之火水火相包合而爲一以入神宮定息内觀一意不散神識俱妙靜中常聞樂聲如夢非夢若在虗無之境風光景物不比塵俗繁華美麗勝於人世樓臺宮闕碧瓦凝烟珠翠綺羅馨香成陣當此之時乃曰超内院陽神方得聚會而還上丹鍊神成仙以合大道一撞天門金光影裏以現法身閙花深處而坐凡體乘空如履平川萬里若同展臂若復能囘入本軀神與形合天地齊其長久若厭居塵世寄下凡胎而返十洲於紫府太微眞君處契勘鄉原對會名姓校量功行之高下得居於三島而遨遊永出風塵之外名曰超塵脫凡呂曰鍊形止於住世鍊氣方可升仙世人不達玄機無藥而先行胎息强留在腹或積冷氣而成病或發虛陽而作疾修行本望長生似此執迷尚不免於疾病殊不知胎仙就而眞氣生眞氣生而自然胎息胎息以鍊氣鍊氣以成神然而鍊氣必審年中之月月中之日日中之時端居靜室忘機絶迹當此之時心境未除者悉以除之或妄想不已智識有漏志在升仙而心神不定爲之奈何鍾曰交合各有時行持各有法依時行法卽法求道指日成功易如反掌古今達士閉目㝠心以入希夷之域良以内觀而神識自在矣論内觀第十六呂曰所謂内觀之理可得聞乎鍾曰内觀坐忘存想之法先賢後聖有取有不取者慮其心猿意馬無所停留恐因物喪志而無中立象使耳不聞而目不見心不狂而意不亂存想事物而内觀坐忘不可無矣奈何少學無知之徒不知交合之時又不曉行持之法必望存想决要成功意内成丹想中取藥鼻搐口咽望有形之日月無爲之天地留止腹中可謂兒戲所以達士奇人於坐忘存想一旦毁之乃曰夢裏得財安能濟用畫地爲餅豈可充饑空中又空如鏡花水月終難成事然而有可取者蓋以易動者片心難伏者一意好日良時可採可取雖知淸靜之地奈何心爲事役志以情移時比電光寸陰可惜毫末有差而天地懸隔積年累月而不見功其失在心亂而意狂者也善視者志在丹靑之美而不見泰華善聽者志在竹之音而不聞雷霆耳目之用小矣尚且如此況一心縱橫六合而無不該得時用法之際能不以存想内觀而致之乎呂曰所謂存想内觀大畧如何鍾曰如陽升也多想爲男爲龍爲火爲天爲雲爲鶴爲日爲馬爲烟爲霞爲車爲駕爲花爲氣若此之類皆内觀存想以應陽升之象也如陰降也多想爲女爲虎爲水爲地爲雨爲龜爲月爲牛爲泉爲泥爲船爲葉若此之類皆内觀存想以應陰降之象也靑龍白虎朱雀玄武旣有此名須有此象五嶽九州四海三島金男玉女河車重樓呼名比類不可具述皆無中立象以定神識未得魚則筌不可失矣未獲兔則蹄不可無矣後車將動必履前車之迹大器已成必爲後器之模則内觀之法行持不可闕矣亦不可執之於悠久絶之於斯須若絶念無想是爲眞念眞念是爲眞空眞空一境乃朝眞遷化而出昏衢超脫之漸也開基創始指日進功則存想可用況當爲道日損以入希夷之域法自減省全在内觀者矣呂曰若以龍虎交媾而匹配陰陽其想也何似鍾曰初以交合配陰陽而定坎離其想也九皇眞人引一朱衣小兒木火上升九皇眞母引一皂衣小女金水下降相見於黃屋之前不入黃庭有一黃衣老嫗接引調息如人間夫婦之禮盡時歡悅女子下降嚥送黃庭兒子上升如人間分離之事旣畢黃嫗抱一物形若朱橘下抛入黃屋以金器盛留然此兒者是乾索於坤其陽復還本位以陽負陰而會本鄉此女者是坤索於乾其陰復還本位以陰抱陽而會本鄉此坎離相交而匹配陰陽之想也若炎炎火中見一黑虎金水上升滔滔浪裏見一赤龍木火下降二獸相逢交戰在樓閣之前朱門大啟浡浡烟焰之中有王者指顧於大火焚天上升結黃芽上有萬丈波濤金水之氣火起復落煙熖滿於天地龍虎一盤一遶卽一呼一吸三八之數而入一金器之中下入黃屋之間仍嚥一口送下似置在籠櫃之中此龍虎交媾而變黃芽之想也呂曰匹配陰陽而龍虎交媾内觀存想旣巳知之矣所謂進火燒鍊丹藥者其想如何鍾曰其想也一器如鼎如釜或黃或黑形如車輪左靑龍而右白虎前朱雀而後玄武傍有二臣臣火衣紫袍躬身執圭而立次有僕吏民火之類執薪然火於器次有一朱衣王者當人乘赤馬駕火雲自空而來舉鞭指呼惟恐火小焰微炎炎亘空撞天衝泥丸欲出天關不開煙熖復下周圍四匝人物器釜王者大臣盡在紅熖之中互相指呼爭要進火器中之水無氣而似凝結水中之珠無暗而似光彩此進火燒丹藥之想也呂曰内觀存想止於採藥進火而有邪逐法逐事而有邪鍾曰雲雷下降煙熖上起或而天雨奇花祥風瑞氣起於殿庭之下或而仙娥玉女乘彩鳳祥鸞自靑霄而來金盤中捧玉露霞漿而下獻於王者若此乃金液還丹旣濟之想也若龍虎曳車於火中上衝三關各有兵吏不計幾何器仗戈甲恐懼於人先以龍虎撞之不開次以大火燒之方啟以至崑崙不住及到天池方止或而三鶴沖三天或而雙蝶入三宮或而五彩雲中捧朱衣小兒而過天門或而金車玉輅載王者而超三界若此乃肘後飛金精大河車之想也及夫朱衣使者乘車循行自冀州入兖州自兖州入靑州自靑州入徐州自徐州入揚州自揚州入荆州自荆州入梁州自梁州入雍州自雍州復還冀州東西南北畢於豫州停留而後循行所得之物金玉所幹之事凝滯一吏傳命而九州通和周而復始運行不已或而遊五嶽自恒山爲始或而泛五湖自北沼爲始或而天符勅五帝或而王命詔五侯此乃還丹之想也及夫珠玉散擲於地或雨露濟澤於物或海潮而滿百川或陽生而發萬彚或火發而徧天地或烟霧而充宇宙此乃鍊形之想也及夫或如鶴之辭巢或如龍之出穴或五帝朝天或五色雲起或跨丹鳳而沖碧落或如夢寐中而上天衢或天花亂墜仙樂嘈雜而金光繚繞以入宮殿繁華之處若此皆朝元之想也朝元之後不復存想方號内觀呂曰内觀玄理不比前法可得聞乎鍾曰古今修道之士不達天機始也不解依法行持欲以速求超脫多入少出而爲胎息冥心閉目以行内觀止於定中以出陰神乃作淸靈之鬼非爲純陽之仙眞仙上聖所以採藥進火抽鉛添汞還丹鍊形朝元合氣苦語詳言而深說惟恐世人不悟而於内觀未甚留意殊不知内觀之法乃陰陽變換之法仙凡改易之時奉道之士勿得輕示而小用之且前項之事交會有時日行持有法則凡所謹節信心依時行法不差毫末而指日見功若此内觀一無時日二無法則所居深靜之室晝夜端拱識認陽神趕逐陰鬼達磨面壁九年方超内院世尊冥心六載始出樊籠故於内觀誠爲難事始也自上而下紫河車搬入天宮天宮富貴孰不欽羡或往或來繁華奢侈人所不得見者悉皆有之奉道之士平日淸淨守於瀟灑寂寞旣已久矣功到數足輙受快樂樓臺珠翠女樂笙簧珍饈異饌異草奇花景物風光觸目如畫彼人不悟將謂實到天宮不知自身内院認作眞境因循而不能出乃曰困在昏衢留形住世不得脫質以爲神仙未到天宮方在内觀陰鬼外魔因意生像因像生境以爲魔軍奉道之士因而狂蕩而入於邪中或而失身於外道終不能成仙蓋以三尸七魄惟願人死而自身快樂九蟲六賊苦於人安則存留無處也論魔難第十七呂曰内觀以聚陽神鍊神以超内院上踴以出天門直超而入聖品旣出旣入而來往無差或來或往而遠近不錯欲住世則神與形合欲升仙則遠遊蓬島若此功滿三千而自内觀以得超脫不知陰鬼邪魔如何制使奉道之人不得升神仙者也鍾曰奉道之士始發信心以恩愛利名一切塵勞之事不可變其大志次發苦志以勤勞寂寞一切淸虛之境不可改其初心苦志必欲了於大成止於中成而已必欲了於中成止於小成而已又況不識大道難曉天機所習小法而多好異端嵗月蹉跎不見其功晚年衰老復入輪迴致使後來好道之士以長生爲妄說超脫爲虗言往往聞道而不信心縱信之而無苦志對境生心以物喪志終不能出於十魔九難之中矣呂曰所謂九難者何也鍾曰大藥未成難當寒暑一年之内四季要衣眞氣未生尚有饑渴一日之間三飱要食奉道之士所患者衣食逼迫一難也或者宿緣業重留於今世塡還忙裏偷閒猶爲尊長約束制於尊親而不忍逃離一向淸閒而難爲得暇奉道之士所患者尊長阻攔此二難也或者愛者妻兒惜者父母恩枷情杻每日增添火院愁車無時休歇縱有淸淨之心難敵愁煩之境奉道之士所患者恩愛牽纒三難也或者富兼萬戶貴極三公妄心不肯暫休貪者惟憂不足奉道之士所患者名利縈絆四難也或者少年不肯修持一以氣弱成病頑心絶無省悟一以陰報成災見世一身受苦而與後人爲誡奉道之士所患者災禍橫生五難也或者以生死事大急於求師不擇眞僞或師於辨辭利口或師於道貌古顏始也自謂得遇神仙終久方知好利之輩奉道之士所患者盲師約束六難也或者盲師狂友妄指旁門尋枝摘葉而終無契合小法異端互相指訣殊不知日月不出出則大明使有目者皆見雷霆不震震則大驚使有耳者皆聞彼以爝火之光井蛙之語熒熒唧唧豈有合同奉道之士所患者議論差別七難也或者朝爲而夕改坐作而立忘悅於須臾而厭爲持久始於憂勤而終於懈怠奉道之士所患者志意懈怠八難也或者身中失年年中失月月中失日日中失時少則名利不忘於心老而兒孫常在於意年光有限勿謂今年巳過以待明年人事無涯勿謂今日已過以待明日今日尚不保明日老年爭卻得少年奉道之士所患者嵗月蹉跎九難也免此九難方可奉道九難之中或有一二不可行持但徒勞而不能成功者也呂曰九難旣已知矣所謂十魔者可得聞乎鍾曰所謂十魔者凡有三等一曰身外見在二曰夢寐三曰内觀如滿目花芳滿耳笙簧舌求甘味鼻好異香情思舒蕩意氣洋洋如見不得認是六賊魔也如瓊樓寶閣畫棟雕梁珠簾繡幕蕙帳蘭房珊瑚徧地金玉滿堂如見不得認是富魔也如金鞍寶馬重蓋昻昻侯封萬戶使節旌幢滿門靑紫靴笏盈牀如見不得認是貴魔也如輕烟蕩漾暖日舒長暴風大雨雷震電光笙簧嘹喨哭泣悲傷如見不得認是六情魔也如親戚患難眷屬災傷兒女疾病父母喪亡兄弟離散妻妾分張如見不得認是恩愛魔也如失身火鑊墮落高岡惡蟲爲害毒藥所傷路逢兇黨犯法身亡如見不得認是患難魔也如十地當陽三淸玉皇四神七曜五嶽八王威儀節制往復翶翔如見不得認是聖賢魔也如雲屯士馬兵刄如霜戈矛鬬舉弓箭齊張爭來殺害驍㨗難當如見不得認是刀兵魔也如仙娥玉女羅列成行笙簧嘹喨齊舉霓裳雙雙紅袖爭獻金觴如見不得認是女樂魔也如幾多姝麗艷質濃粧蘭臺夜飲玉體輕裳殢人驕態爭要成雙如見不得認是女色魔也是此十魔惟有不認者是也旣認則著旣著則執所以不成道者良以此也若奉道之人身外見在而不認不執則心不退而志不移夢寐之間不認不着則神不迷而魂不散内觀之時若見如是當審其虛實辨其眞僞不可隨波逐浪認賊爲子急起三昧眞火以焚身一揮而羣魔自散用紫河車般運自已之陽神超内院而上天宮然後以求超脫今古好道之流有淸淨之心對境改志往往難逃於十魔九難空有好道之虛名終不見得道之實迹或出離塵勞幽居絶迹而志在玄門於九難不能盡除在十魔者或着一二非不得道也而於道中或得中成或得小成而於仙中或爲人仙或爲地仙若盡除魔難序證驗而節節升遷以内觀合就陽神指日而歸三島論證驗第十八呂曰嫌者病而好道之人求無病而長安怕者死而好道之人欲不死而長生舉世人在世中而好道之人欲升仙而逰物外舉世人在地上而好道之人欲超凡而入洞天所以甘勞苦守貧賤逰心在淸淡瀟灑之中潛迹於曠野荒僻之地一向行持不知功之深淺法之交換難測改易之早晚所謂下功之後而證驗次序如何鍾曰苦志行持終不見功者非道負人蓋奉道之人不從明師而所受非法依法行持終不見功者非道負人蓋奉道之人不知時候以致無成若已遇明師而得法行大法以依時何患驗證而不有也呂曰所謂法者有數乎所謂時者有數乎鍾曰法有十二科匹配陰陽第一聚散水火第二交媾龍虎第三燒鍊丹藥第四肘後飛金精第五玉液還丹第六玉液鍊形第七金液還丹第八金液鍊形第九朝元鍊氣第十内觀交換第十一超脫分形第十二其時則年中法天地陰陽升降之宜月中法日月往來之數日中有四正八卦十干十二支一百刻六十分依法區分自一日之後證驗次序以至脫質升仙無差毫末始也婬邪盡罷而外行兼修凡採藥之次而金精充滿心境自除以煞陰鬼次心經上湧口有甘液次陰陽擊搏時時腹中聞風雷之聲次魂魄不定夢寐多有恐悸之境次六府四肢或生微疾小病不療自愈次丹田夜則自煖形容晝則淸秀次居暗室而目有神光自現次夢中雄勇物不能害而人不能欺或如抱得嬰兒歸次金關玉鎻封固以絶夢泄遺漏次鳴雷一聲關節通連而驚汗四溢次玉液烹潄以成凝酥次靈液成膏漸畏腥羶以充口腹次塵骨將輕而變陽神步趁奔馬行止如飛次對境無心而絶嗜慾次眞氣入物可以療人疾病次内觀明朗而不暗昧次雙目童人如點漆皺臉重舒而紺髮再生已少者永駐童顏次眞氣漸足而似常飽所食不多飲酒無量終不見醉次身體光澤神氣秀媚聖丹生味靈液透香眞香異味常在口鼻之間人或知而聞之次以目視百步而見秋毫次身體之間舊痕殘靨自然消除涕淚涎汗亦不見有次胎完氣足以絶飲食次内志淸高以合太虛凡情凡愛心境自絶下盡九蟲上死三尸次魂魄不遊以絶夢寐神彩淸爽更無晝夜次陽精成體神府堅固四體不畏寒暑次生死不能相干而坐忘内觀以遊華胥神仙之國女樂樓臺繁華美麗殆非人世所有也次功滿行足陰功報應宻授三淸眞籙陰陽變化可能預知人事舉止先見災福次觸目塵冗以厭往還潔身靜處胎仙可現身外有身是爲神聖次眞氣純陽噓呵可乾外汞次胎仙常欲騰飛祥光生於臥室次靜中時聞樂聲次常人對面雖彼富貴之徒亦聞腥穢蓋凡骨俗體也次神彩自可變移容儀成而仙姿可比玉樹異骨透出金色次行止去處常有神祇自來朝見驅用指呼一如已意次靜中外觀紫霞滿目頂外下視金光罩體次身中忽化火龍飛或而玄鶴起便是神靈以脫凡骨而超出俗流乃曰超脫次超脫之後彩雲繚繞瑞氣紛紜天雨奇花玄鶴對飛異香散而玉女下降授天書紫詔旣畢而仙冠仙衣之屬具備節制威儀前後左右不可勝紀相迎相引以返蓬萊而於紫府朝見太微眞君契勘鄉原名姓校量功行等殊而於三島安居乃曰眞人仙子呂曰今日特䝉尊師開說希夷大理天地玄機不止於耳目淸明而精神秀媚殘軀有託終不與糞壤同類然而知之者未必能行行之者未必能得念生死事大時光迅速雖知妙理未得行持終不成功與不知無異敢告指教以交會之時行持之法如何下手如何用功鍾曰僕有靈寶畢法凡十卷一十六科中有六儀一曰金誥二曰玉書三曰眞原四曰比喻五曰眞訣六曰道要包羅大道引喻三淸指天地陰陽之升降爲範模將日月精華之往來爲法則實五仙之指趣乃三成之規式當擇日而授於足下愚讀鍾呂傳道集畢隨於道藏中檢閱至太淸部志字函果有秘傳正陽眞人靈寶畢法十卷共三冊謹詳味辭旨意見多不可解恐初入門者或難曉焉遂不遑錄及倘同志之士異日參閱至此則愚錄不錄之意可槪見矣時天啟二年嵗次壬戌仲春朔日復初道人高時明薰沐稽首敬書鍾呂傳道集後跋嘗思萬化之源惟道爲尊道以覺世則玄妙之秘旨性命之要法也茲冊淵源所自肇起天仙之眞傳凡後世一切元機奧穴文總不出此範圍焉蓋世人只知依文解義用識解推測則於經内所論眞仙大道天地日月四時五行水火龍虎丹藥鉛汞抽添河車還丹鍊形朝元内觀魔難證驗以爲如是如是而豈知不僅如是如是夫言外有義義外有神非第關合更多玄妙微乎微乎殆不可以章句詮不可以心思度乎是殆五祖七眞一切賢聖之要典乎由唐迄今千百餘年所共尊奉而循行者乎現届重訂全書宗正小子鳩工庀材實督任剞劂之事而於此經竊欲誌一言爰作數語附於篇末至此經之精微則宏教眞君恩大祖師言之詳且賅矣夫何庸再贅爲哉純陽法嗣正化子恩洪謹跋
