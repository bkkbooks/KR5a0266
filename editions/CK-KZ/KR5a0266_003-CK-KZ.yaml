front:
  text: 一撞三關直超内院後起前收上補下鍊則大河車固當行矣及夫金液玉液還丹而後鍊形鍊形而後鍊氣鍊氣而後鍊神鍊神合道方曰道成以出凡類入仙品當時乃曰紫河車也
  hash: sha256:35ad7d343c978c1b8aafe20515612ff04f75fe69f1a38cb186d4252501cf936b
